// The photo itself is only handed to Tesseract for on-device OCR and is
// never saved to state, localStorage, or the Google Drive sync payload —
// only the numbers the person confirms get kept. Nothing else touches the
// image, and it's discarded (garbage-collected) right after recognition.
async function ocrImage(file) {
if (!window.Tesseract) throw new Error("ocr-unavailable");
const result = await window.Tesseract.recognize(file, "eng+tha");
return (result && result.data && result.data.text) || "";
}

function extractNumberCandidates(text, keywords) {
const lines = text.split(/\n+/);
const numRe = /(?<!\d)\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?(?!\d)/g;
const seen = new Set();
const candidates = [];
lines.forEach((line) => {
const matches = line.match(numRe);
if (!matches) return;
const lower = line.toLowerCase();
const isKeywordLine = keywords.some((k) => lower.includes(k.toLowerCase()));
matches.forEach((m) => {
const val = parseFloat(m.replace(/,/g, ""));
if (!val || val < 10) return;
const dupKey = val.toFixed(2);
if (seen.has(dupKey)) return;
seen.add(dupKey);
candidates.push({ value: val, guess: isKeywordLine });
});
});
candidates.sort((a, b) => (b.guess === a.guess ? 0 : b.guess ? 1 : -1));
return candidates.slice(0, 8);
}

// Read the amount that appears right AFTER a keyword on its line. Taking the
// first number after the label (not the last on the line) keeps the correct
// value even when OCR merges the payslip's two columns into one line, and it
// avoids dropping a value shared by two rows (e.g. base salary == fixed bonus).
function readFieldFromText(text, keywords) {
const lines = text.split(/\n+/);
const numRe = /(?<!\d)\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?(?!\d)/g;
for (const line of lines) {
const lower = line.toLowerCase();
let after = -1;
for (const k of keywords) {
const idx = lower.indexOf(k.toLowerCase());
if (idx !== -1) { after = idx + k.length; break; }
}
if (after === -1) continue;
const rest = line.slice(after).match(numRe);
if (!rest) continue;
const nums = rest.map((m) => parseFloat(m.replace(/,/g, ""))).filter((v) => v >= 1);
if (nums.length) return nums[0];
}
return null;
}

function InsuranceList({ title, items, onChange, keywords }) {
const [ocrBusy, setOcrBusy] = useState(false);
const [ocrError, setOcrError] = useState(false);

const addItem = (prefill) => {
onChange([...items, { id: `${Date.now()}-${Math.random()}`, name: "", premium: 0, ...(prefill || {}) }]);
};
const updateItem = (id, patch) => {
onChange(items.map((it) => (it.id === id ? { ...it, ...patch } : it)));
};
const removeItem = (id) => {
onChange(items.filter((it) => it.id !== id));
};
const total = items.reduce((s, it) => s + (Number(it.premium) || 0), 0);

const handleAddByPhoto = async (e) => {
const file = e.target.files && e.target.files[0];
e.target.value = "";
if (!file) return;
setOcrError(false);
setOcrBusy(true);
try {
const text = await ocrImage(file);
const found = extractNumberCandidates(text, keywords);
const best = found.find((c) => c.guess) || found[0];
if (best) {
addItem({ premium: best.value });
} else {
addItem({});
setOcrError(true);
}
} catch (err) {
addItem({});
setOcrError(true);
} finally {
setOcrBusy(false);
}
};

return (
<div style={{ marginBottom: 16 }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
<span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 600, color: "#202B29" }}>{title}</span>
<span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 700, color: "#202B29" }}>{fmt(total)}</span>
</div>
{items.length === 0 && (
<div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#8C8577", marginBottom: 8 }}>
ยังไม่มีกรมธรรม์ · เพิ่มด้วยปุ่มด้านล่าง
</div>
)}
{items.map((it) => (
<InsuranceRow key={it.id} item={it} onUpdate={(patch) => updateItem(it.id, patch)} onRemove={() => removeItem(it.id)} />
))}
<div style={{ display: "flex", gap: 8 }}>
<button
onClick={() => addItem()}
style={{ flex: 1, padding: "9px 10px", borderRadius: 10, border: "1.5px dashed #C9C2B2", background: "transparent", color: "#6B6459", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 600, cursor: "pointer" }}
>
+ เพิ่มกรมธรรม์ (กรอกเอง)
</button>
<label
title="อ่านค่าในเครื่องเท่านั้น ไม่เก็บ/ไม่อัปโหลดรูป"
style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "9px 10px", borderRadius: 10, border: "1.5px dashed #2B4C6F", background: "#EAF0F6", color: "#2B4C6F", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 600, cursor: "pointer", textAlign: "center" }}
>

function PayslipUpload({ currentValues, onApply }) {
const [ocrBusy, setOcrBusy] = useState(false);
const [ocrError, setOcrError] = useState(false);
const [review, setReview] = useState(null); // { values: {...}, detected: Set(keys) }

const handleFile = async (e) => {
const file = e.target.files && e.target.files[0];
e.target.value = "";
if (!file) return;
setOcrError(false);
setOcrBusy(true);
setReview(null);
try {
const text = await ocrImage(file);
const values = {};
const detected = new Set();
OCR_FIELD_DEFS.forEach((f) => {
const val = readFieldFromText(text, f.keywords);
if (val !== null) {
values[f.key] = val;
detected.add(f.key);
} else {
values[f.key] = currentValues[f.key] || 0;
}
});
if (detected.size === 0) setOcrError(true);
else setReview({ values, detected });
} catch (err) {
setOcrError(true);
} finally {
setOcrBusy(false);
}
};

if (review) {
return (
<div style={{ background: "#EAF0F6", border: "1px solid #B9CBDD", borderRadius: 12, padding: 14, marginBottom: 16 }}>
<div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 700, fontSize: 12.5, color: "#2B4C6F", marginBottom: 2 }}>
ตรวจสอบค่าที่อ่านได้จากภาพ
</div>
<div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11, color: "#5B7594", marginBottom: 10 }}>
พบ {review.detected.size} ค่าในภาพนี้ · แก้ไขตัวเลขได้ก่อนบันทึก
</div>
{OCR_FIELD_DEFS.map((f) => (
<div key={f.key} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
<span style={{ flex: 1, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12, color: "#202B29" }}>
{review.detected.has(f.key) ? "✓ " : ""}{f.label}
</span>
<input
type="number"
value={review.values[f.key] || ""}
onChange={(e) => setReview({ ...review, values: { ...review.values, [f.key]: parseFloat(e.target.value) || 0 } })}
style={{ width: 120, padding: "6px 8px", borderRadius: 8, border: review.detected.has(f.key) ? "1px solid #2F5D46" : "1px solid #B9CBDD", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, textAlign: "right", background: "#FFFFFF" }}
/>
</div>
))}
<div style={{ display: "flex", gap: 8, marginTop: 10 }}>
<button
onClick={() => { onApply(review.values); setReview(null); }}
style={{ flex: 1, padding: "9px 12px", borderRadius: 10, border: "none", background: "#2B4C6F", color: "#FFFFFF", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 600, fontSize: 12.5, cursor: "pointer" }}
>
บันทึกค่านี้ลงฟอร์ม
</button>
<button
onClick={() => setReview(null)}
style={{ padding: "9px 14px", borderRadius: 10, border: "1px solid #B9CBDD", background: "#FFFFFF", color: "#6B6459", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 600, fontSize: 12.5, cursor: "pointer" }}
>
ยกเลิก
</button>
</div>
</div>
);
}

return (
<div style={{ marginBottom: 16 }}>
<label style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, width: "100%", padding: "13px", borderRadius: 12, border: "1.5px dashed #2B4C6F", background: "#EAF0F6", color: "#2B4C6F", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 600, fontSize: 12.5, cursor: "pointer", textAlign: "center" }}>
{ocrBusy ? "กำลังอ่านภาพ (ครั้งแรกอาจใช้เวลาสักครู่)..." : "📷 แนบสลิปเงินเดือน/เอกสาร — อ่านได้หลายค่าในรูปเดียว"}
<input type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={handleFile} />
</label>
<div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 10.5, color: "#8C8577", marginTop: 5, textAlign: "center" }}>
รูปใช้อ่านค่าในเครื่องคุณเท่านั้น ไม่เก็บและไม่อัปโหลดรูปไว้ที่ไหน — เก็บแค่ตัวเลขที่คุณกดยืนยัน
</div>
{ocrError && (
<div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11, color: "#7A2E1F", marginTop: 6, textAlign: "center" }}>
อ่านภาพไม่สำเร็จ หรือไม่พบค่าที่เกี่ยวข้องในภาพนี้ ลองภาพที่ชัดขึ้น หรือกรอกเองด้านล่าง
</div>
)}
</div>
);
}

<div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#6B6459", marginTop: 10 }}>
หนี้สินคิดเป็น {pct(TOTAL_LIAB, TOTAL_ASSETS)} ของสินทรัพย์รวม
</div>
</div>

<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 24 }}>
<StatCard label="รายรับ ก.ค. 2569" value={fmt(INCOME_JULY.total)} color="#1F6E6B" />
<StatCard label="รายจ่าย ก.ค. 2569" value={fmt(TOTAL_EXPENSE)} sub={`คงที่ ${fmt(FIXED_TOTAL)} + ผันแปร ${fmt(VARIABLE_TOTAL)}`} color="#8A5A2B" />
<StatCard label="คงเหลือสุทธิเดือนนี้" value={fmt(NET_CASHFLOW)} sub={NET_CASHFLOW >= 0 ? `อัตราการออม ${pct(NET_CASHFLOW, INCOME_JULY.total)}` : "รายจ่ายสูงกว่ารายรับเดือนนี้"} color={NET_CASHFLOW >= 0 ? "#202B29" : "#7A2E1F"} />
<StatCard label="สินทรัพย์สภาพคล่อง" value={fmt(ASSET_GROUPS[0].value)} sub="เงินสด/บัญชีออมทรัพย์" color="#202B29" />
</div>

<div style={{ marginBottom: 24 }}>
<SectionTitle eyebrow="สินทรัพย์" title={`รวม ${fmt(TOTAL_ASSETS)}`} />
<CompositionBar groups={ASSET_GROUPS} total={TOTAL_ASSETS} />
<GroupList groups={ASSET_GROUPS} total={TOTAL_ASSETS} />
</div>

<div style={{ marginBottom: 24 }}>
<SectionTitle eyebrow="หนี้สิน" title={`รวม ${fmt(TOTAL_LIAB)}`} />
<CompositionBar groups={LIABILITY_GROUPS} total={TOTAL_LIAB} />
<GroupList groups={LIABILITY_GROUPS} total={TOTAL_LIAB} />
</div>

<div style={{ marginBottom: 24 }}>
<SectionTitle eyebrow="กระแสเงินสด · กรกฎาคม 2569" title="รายรับ vs รายจ่าย" />
<div style={{ background: "#FFFFFF", border: "1px solid #E6E0D2", borderRadius: 14, padding: 16 }}>
<div style={{ marginBottom: 14 }}>
<div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, marginBottom: 5 }}>
<span style={{ color: "#1F6E6B", fontWeight: 600 }}>รายรับ</span>
<span style={{ fontWeight: 700, color: "#202B29" }}>{fmt(INCOME_JULY.total)}</span>
</div>
<div style={{ width: "100%", height: 12, borderRadius: 999, background: "#EDE8DC" }}>
<div style={{ width: "100%", height: "100%", borderRadius: 999, background: "#1F6E6B" }} />
</div>
</div>
<div>
<div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, marginBottom: 5 }}>
<span style={{ color: "#8A5A2B", fontWeight: 600 }}>รายจ่าย</span>
<span style={{ fontWeight: 700, color: "#202B29" }}>{fmt(TOTAL_EXPENSE)}</span>
</div>
<div style={{ width: "100%", height: 12, borderRadius: 999, background: "#EDE8DC" }}>
<div style={{ width: `${Math.min((TOTAL_EXPENSE / INCOME_JULY.total) * 100, 100)}%`, height: "100%", borderRadius: 999, background: "#8A5A2B" }} />
</div>
</div>
<div style={{ marginTop: 14, paddingTop: 12, borderTop: "1px dashed #E6E0D2", display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
<span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, color: "#6B6459" }}>คงเหลือสุทธิ</span>
<span style={{ fontFamily: "'Noto Serif Thai', serif", fontWeight: 700, fontSize: 20, color: NET_CASHFLOW >= 0 ? "#202B29" : "#7A2E1F" }}>{fmt(NET_CASHFLOW)}</span>
</div>
{NET_CASHFLOW < 0 && (
<div style={{ marginTop: 6, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#7A2E1F" }}>
รายจ่ายรวมสูงกว่ารายรับ {fmt(Math.abs(NET_CASHFLOW))} บาทในเดือนนี้
</div>
)}
</div>
</div>

<div style={{ marginBottom: 8 }}>
<SectionTitle eyebrow="รายจ่ายแยกตามหมวด" title={`รวม ${fmt(TOTAL_EXPENSE)}`} />
<CompositionBar groups={EXPENSE_SPLIT} total={TOTAL_EXPENSE} />
<div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#6B6459", margin: "6px 0 18px" }}>
<span>คงที่ {fmt(FIXED_TOTAL)} ({pct(FIXED_TOTAL, TOTAL_EXPENSE)})</span>
<span>ผันแปร {fmt(VARIABLE_TOTAL)} ({pct(VARIABLE_TOTAL, TOTAL_EXPENSE)})</span>
</div>
<div style={{ background: "#FFFFFF", border: "1px solid #E6E0D2", borderRadius: 14, padding: 16, marginBottom: 20 }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
<span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 600, color: "#202B29" }}>เช็คลิสต์การจ่ายเดือนนี้</span>
<span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12, color: "#6B6459" }}>{paidCount}/{CHECKLIST_ITEMS.length} รายการ</span>
</div>
<div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11, marginBottom: 8, color: syncError ? "#7A2E1F" : DRIVE_CONFIGURED ? "#2F5D46" : "#AD8A2E" }}>
{!loaded
? "กำลังโหลด..."
: syncError
? "⚠️ ซิงก์ Google Drive ไม่สำเร็จ (เช็คอินเทอร์เน็ต/URL) — ใช้ข้อมูลล่าสุดที่มีอยู่ไปก่อน"
: DRIVE_CONFIGURED
? "☁️ ซิงก์กับ Google Drive แล้ว — เปิดจากเครื่องไหนก็เห็นเหมือนกัน"
: "ยังไม่ได้ตั้งค่า Google Drive — ข้อมูลเก็บไว้ในเบราว์เซอร์นี้ก่อน"}
</div>
<div style={{ width: "100%", height: 8, borderRadius: 999, background: "#EDE8DC", overflow: "hidden" }}>
<div style={{ width: `${CHECKLIST_ITEMS.length ? (paidCount / CHECKLIST_ITEMS.length) * 100 : 0}%`, height: "100%", background: "#2F5D46", transition: "width .25s" }} />
</div>
<div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#6B6459" }}>
<span>จ่ายแล้ว {fmt(paidSum)} จาก {fmt(TOTAL_EXPENSE)}</span>
<button onClick={resetChecklist} style={{ background: "none", border: "none", color: "#AD8A2E", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, cursor: "pointer", padding: 0 }}>ล้างเช็คลิสต์</button>
</div>
</div>

<div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 600, color: "#8A5A2B", marginBottom: 2 }}>รายจ่ายคงที่ · หักอัตโนมัติวันที่ 1 ทุกเดือน</div>
<GroupList groups={FIXED_EXPENSE_GROUPS} total={FIXED_TOTAL} checkable paid={paid} onToggle={togglePaid} />

<div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 600, color: "#8A5A2B", margin: "20px 0 10px" }}>รายจ่ายผันแปร · ตามรายวัน (แตะหมวดเพื่อดูรายละเอียดร้าน/บัตรที่ใช้จ่าย)</div>
<GroupList groups={VARIABLE_EXPENSE_GROUPS} total={VARIABLE_TOTAL} checkable paid={paid} onToggle={togglePaid} />
</div>

<div style={{ marginTop: 18, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11, color: "#8C8577", lineHeight: 1.6 }}>
หมายเหตุ: ข้อมูลสินทรัพย์และหนี้สิน ณ วันที่ 6 เม.ย. 2569 รายจ่ายเดือน ก.ค. 2569 แบ่งเป็นรายจ่ายคงที่ที่หักอัตโนมัติทุกวันที่ 1 และรายจ่ายผันแปรรายวันเท่าที่ปรากฏในภาพ (ถึงวันที่ 27 ก.ค.) อาจไม่ครบทั้งเดือน แตะรายการเพื่อติ๊กว่าจ่ายแล้ว สถานะจะซิงก์ขึ้น Google Drive ของคุณ (ผ่าน Google Apps Script) เปิดเว็บนี้จากอุปกรณ์ไหนก็เห็นข้อมูลเดียวกัน
</div>
</div>
</div>
);
}

function App() {
const [view, setView] = useState("dashboard");
const [allData, setAllData] = useState({});
const [loaded, setLoaded] = useState(false);
const [syncError, setSyncError] = useState(false);

useEffect(() => {
let mounted = true;
if (!DRIVE_CONFIGURED) {
try {
const raw = localStorage.getItem(LOCAL_FALLBACK_KEY);
if (mounted) setAllData(raw ? JSON.parse(raw) : {});
} catch (e) {}
if (mounted) setLoaded(true);
return;
}
fetch(DRIVE_API_URL)
.then((r) => r.json())
.then((data) => { if (mounted) setAllData(data || {}); })
.catch(() => { if (mounted) setSyncError(true); })
.finally(() => { if (mounted) setLoaded(true); });
return () => { mounted = false; };
}, []);

const persist = (nextAllData) => {
setAllData(nextAllData);
if (!DRIVE_CONFIGURED) {
try { localStorage.setItem(LOCAL_FALLBACK_KEY, JSON.stringify(nextAllData)); } catch (e) {}
return;
}
setSyncError(false);
fetch(DRIVE_API_URL, {
method: "POST",
headers: { "Content-Type": "text/plain;charset=utf-8" },
body: JSON.stringify(nextAllData),
}).catch(() => setSyncError(true));
};

return (
<div style={{ minHeight: "100vh", background: "#F6F3EC" }}>
<TopNav view={view} setView={setView} />
{view === "dashboard" ? (
<FinanceDashboard allData={allData} loaded={loaded} syncError={syncError} persist={persist} />
) : (
<TaxPrep allData={allData} loaded={loaded} syncError={syncError} persist={persist} />
)}
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
