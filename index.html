const fmt = (n) => "฿" + Math.round(n || 0).toLocaleString("th-TH");
const pct = (n, total) => (total ? ((n / total) * 100).toFixed(1) : "0.0") + "%";

function parseNum(str, fallback) {
  if (str === undefined || str === null || str === "") return fallback;
  const cleaned = String(str).replace(/,/g, "").trim();
  const n = parseFloat(cleaned);
  return isNaN(n) ? fallback : n;
}
function makeId() {
  return `item-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
}

// ---------- Thai calendar helpers ----------
const THAI_MONTHS_ABBR = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const THAI_MONTHS_FULL = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const NOW = new Date();
const CURRENT_BE_YEAR = NOW.getFullYear() + 543;
const CURRENT_MONTH_FULL = `${THAI_MONTHS_FULL[NOW.getMonth()]} ${CURRENT_BE_YEAR}`;
const CURRENT_MONTH_ABBR = `${THAI_MONTHS_ABBR[NOW.getMonth()]} ${CURRENT_BE_YEAR}`;
// เดือนของเช็คลิสต์ คำนวณจากวันที่ปัจจุบันเสมอ พอขึ้นวันที่ 1 ของเดือนใหม่
// คีย์นี้จะเปลี่ยนไปเอง ทำให้ไม่มีข้อมูลติ๊กเก่าอยู่ในคีย์ใหม่ — เช็คลิสต์
// จึงว่างพร้อมให้ติ๊กใหม่ของเดือนนั้นโดยอัตโนมัติ
const MONTH_KEY = `${CURRENT_BE_YEAR}-${String(NOW.getMonth() + 1).padStart(2, "0")}`;

function formatThaiDateTime(d) {
  const day = d.getDate();
  const month = THAI_MONTHS_ABBR[d.getMonth()];
  const year = d.getFullYear() + 543;
  const hh = String(d.getHours()).padStart(2, "0");
  const min = String(d.getMinutes()).padStart(2, "0");
  return `${day} ${month} ${year} เวลา ${hh}:${min} น.`;
}

// Recomputes each group's total from its (possibly edited) items.
function withTotals(groups) {
  return groups.map((g) => ({ ...g, value: g.items.reduce((s, it) => s + (Number(it.value) || 0), 0) }));
}
// While a section is being edited, show live totals from the in-progress draft
// (string values); otherwise just show the saved totals.
function liveGroups(baseGroupsT, editing, draft) {
  if (!editing || !draft) return baseGroupsT;
  return draft.map((g) => {
    const items = g.items.map((it) => ({ ...it, value: parseNum(it.value, 0) }));
    const value = items.reduce((s, it) => s + it.value, 0);
    return { ...g, items, value };
  });
}
function cloneAsDraft(groups) {
  return groups.map((g) => ({ ...g, items: g.items.map((it) => ({ ...it, value: String(it.value) })) }));
}

// Editable version of a group list: number input always, name input + add/remove
// only when the section supports full item management (the expense checklists).
function GroupEditor({ groups, onChangeValue, onChangeName, onAddItem, onRemoveItem, editableName = true, allowAddRemove = true }) {
  return (
    <div style={{ marginTop: 14 }}>
      {groups.map((g) => {
        const groupTotal = g.items.reduce((s, it) => s + parseNum(it.value, 0), 0);
        return (
          <div key={g.key} style={{ border: "1px solid #E6E0D2", borderRadius: 12, padding: 12, marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>

                <span style={{ width: 10, height: 10, borderRadius: 3, background: g.color, flexShrink: 0 }} />

              </span>
              <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, fontWeight: 700, color: "#202B29" }}>{fmt(groupTotal)}</span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {g.items.map((it) => (

                      onChange={(e) => onChangeName(g.key, it.id, e.target.value)}

                  ) : (
                    <span style={{ flex: 1, minWidth: 0, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, color: "#6B6459" }}>{it.name}</span>
                  )}
                  <input type="number" inputMode="decimal" value={it.value} placeholder="0"
                    onChange={(e) => onChangeValue(g.key, it.id, e.target.value)}

function Dashboard() {
  // allData persists (via Google Drive bridge, or localStorage as a fallback):
  //   allData[MONTH_KEY]     -> which checklist items are ticked this month, by item id
  //   allData.assetGroups    -> saved asset groups (once edited)
  //   allData.liabilityGroups-> saved liability groups (once edited)
  //   allData.fixedGroups    -> saved fixed-expense groups (once edited/added/removed)
  //   allData.variableGroups -> saved variable-expense groups (once edited/added/removed)
  //   allData.lastUpdated    -> ISO timestamp of the last edit or checkbox tick
  const [allData, setAllData] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [syncError, setSyncError] = useState(false);

  const [editingAssets, setEditingAssets] = useState(false);
  const [assetDraft, setAssetDraft] = useState(null);
  const [editingLiabilities, setEditingLiabilities] = useState(false);
  const [liabilityDraft, setLiabilityDraft] = useState(null);
  const [editingFixed, setEditingFixed] = useState(false);
  const [fixedDraft, setFixedDraft] = useState(null);
  const [editingVariable, setEditingVariable] = useState(false);
  const [variableDraft, setVariableDraft] = useState(null);

  useEffect(() => {
    let mounted = true;
    if (!DRIVE_CONFIGURED) {
      try {
        const raw = localStorage.getItem(LOCAL_FALLBACK_KEY);
        if (mounted) setAllData(raw ? JSON.parse(raw) : {});
      } catch (e) {}
      if (mounted) setLoaded(true);
      return;
    }
    fetch(DRIVE_API_URL)
      .then((r) => r.json())
      .then((data) => { if (mounted) setAllData(data || {}); })
      .catch(() => { if (mounted) setSyncError(true); })
      .finally(() => { if (mounted) setLoaded(true); });
    return () => { mounted = false; };
  }, []);

  // Every call to persist() represents a real update (amount edit or checkbox
  // tick), so it also stamps "last updated" for the header.
  const persist = (nextAllData) => {
    const stamped = { ...nextAllData, lastUpdated: new Date().toISOString() };
    setAllData(stamped);
    if (!DRIVE_CONFIGURED) {
      try { localStorage.setItem(LOCAL_FALLBACK_KEY, JSON.stringify(stamped)); } catch (e) {}
      return;
    }
    setSyncError(false);
    fetch(DRIVE_API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(stamped),
    }).catch(() => setSyncError(true));
  };

  const assetGroups = allData.assetGroups || DEFAULT_ASSET_GROUPS;
  const liabilityGroups = allData.liabilityGroups || DEFAULT_LIABILITY_GROUPS;
  const fixedGroups = allData.fixedGroups || DEFAULT_FIXED_EXPENSE_GROUPS;
  const variableGroups = allData.variableGroups || DEFAULT_VARIABLE_EXPENSE_GROUPS;

  const assetGroupsT = withTotals(assetGroups);
  const liabilityGroupsT = withTotals(liabilityGroups);
  const fixedGroupsT = withTotals(fixedGroups);
  const variableGroupsT = withTotals(variableGroups);

  // Live display groups: reflect the in-progress draft while editing, saved data otherwise.
  const displayAssetGroups = liveGroups(assetGroupsT, editingAssets, assetDraft);
  const displayLiabilityGroups = liveGroups(liabilityGroupsT, editingLiabilities, liabilityDraft);
  const displayFixedGroups = liveGroups(fixedGroupsT, editingFixed, fixedDraft);
  const displayVariableGroups = liveGroups(variableGroupsT, editingVariable, variableDraft);

  const totalAssets = displayAssetGroups.reduce((s, g) => s + g.value, 0);
  const totalLiab = displayLiabilityGroups.reduce((s, g) => s + g.value, 0);
  const netWorth = totalAssets - totalLiab;
  const fixedTotal = displayFixedGroups.reduce((s, g) => s + g.value, 0);
  const variableTotal = displayVariableGroups.reduce((s, g) => s + g.value, 0);
  const totalExpense = fixedTotal + variableTotal;
  const netCashflow = INCOME.total - totalExpense;
  const expenseSplit = [
    { key: "fixed", label: "รายจ่ายคงที่ (วันที่ 1)", value: fixedTotal, color: "#8A5A2B" },
    { key: "variable", label: "รายจ่ายผันแปรรายวัน", value: variableTotal, color: "#D9AF78" },
  ];

  // Checklist always reflects the saved (non-draft) item set.
  const checklistItems = [...fixedGroups.flatMap((g) => g.items), ...variableGroups.flatMap((g) => g.items)];
  const paid = allData[MONTH_KEY] || {};
  const togglePaid = (id) => {
    const month = { ...(allData[MONTH_KEY] || {}) };
    month[id] = !month[id];
    persist({ ...allData, [MONTH_KEY]: month });
  };
  const resetChecklist = () => persist({ ...allData, [MONTH_KEY]: {} });
  const paidCount = checklistItems.filter((it) => paid[it.id]).length;
  const paidSum = checklistItems.filter((it) => paid[it.id]).reduce((s, it) => s + (Number(it.value) || 0), 0);

  // ---- assets (full CRUD: add / remove / rename / amount) ----
  const startEditAssets = () => { setAssetDraft(cloneAsDraft(assetGroups)); setEditingAssets(true); };
  const updateAssetName = (gk, id, name) => setAssetDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, name } : it) }));
  const updateAssetValue = (gk, id, value) => setAssetDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, value } : it) }));
  const addAssetItem = (gk) => setAssetDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: [...g.items, { id: makeId(), name: "", value: "0" }] }));
  const removeAssetItem = (gk, id) => setAssetDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.filter((it) => it.id !== id) }));
  const cancelEditAssets = () => { setEditingAssets(false); setAssetDraft(null); };
  const saveEditAssets = () => {
    const finalGroups = assetDraft.map((g) => ({ ...g, items: g.items.map((it) => ({ id: it.id, name: (it.name || "").trim() || "รายการใหม่", value: parseNum(it.value, 0) })) }));
    persist({ ...allData, assetGroups: finalGroups });
    setEditingAssets(false); setAssetDraft(null);
  };

  // ---- liabilities (full CRUD: add / remove / rename / amount, same as assets) ----
  const startEditLiabilities = () => { setLiabilityDraft(cloneAsDraft(liabilityGroups)); setEditingLiabilities(true); };
  const updateLiabilityName = (gk, id, name) => setLiabilityDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, name } : it) }));
  const updateLiabilityValue = (gk, id, value) => setLiabilityDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, value } : it) }));
  const addLiabilityItem = (gk) => setLiabilityDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: [...g.items, { id: makeId(), name: "", value: "0" }] }));
  const removeLiabilityItem = (gk, id) => setLiabilityDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.filter((it) => it.id !== id) }));
  const cancelEditLiabilities = () => { setEditingLiabilities(false); setLiabilityDraft(null); };
  const saveEditLiabilities = () => {
    const finalGroups = liabilityDraft.map((g) => ({ ...g, items: g.items.map((it) => ({ id: it.id, name: (it.name || "").trim() || "รายการใหม่", value: parseNum(it.value, 0) })) }));
    persist({ ...allData, liabilityGroups: finalGroups });
    setEditingLiabilities(false); setLiabilityDraft(null);
  };

  // ---- fixed expenses (full CRUD: add / remove / rename / amount) ----
  const startEditFixed = () => { setFixedDraft(cloneAsDraft(fixedGroups)); setEditingFixed(true); };
  const updateFixedName = (gk, id, name) => setFixedDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, name } : it) }));
  const updateFixedValue = (gk, id, value) => setFixedDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, value } : it) }));
  const addFixedItem = (gk) => setFixedDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: [...g.items, { id: makeId(), name: "", value: "0" }] }));
  const removeFixedItem = (gk, id) => setFixedDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.filter((it) => it.id !== id) }));
  const cancelEditFixed = () => { setEditingFixed(false); setFixedDraft(null); };
  const saveEditFixed = () => {
    const finalGroups = fixedDraft.map((g) => ({ ...g, items: g.items.map((it) => ({ id: it.id, name: (it.name || "").trim() || "รายการใหม่", value: parseNum(it.value, 0) })) }));
    persist({ ...allData, fixedGroups: finalGroups });
    setEditingFixed(false); setFixedDraft(null);
  };

  // ---- variable expenses (full CRUD: add / remove / rename / amount) ----
  const startEditVariable = () => { setVariableDraft(cloneAsDraft(variableGroups)); setEditingVariable(true); };
  const updateVariableName = (gk, id, name) => setVariableDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, name } : it) }));
  const updateVariableValue = (gk, id, value) => setVariableDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, value } : it) }));
  const addVariableItem = (gk) => setVariableDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: [...g.items, { id: makeId(), name: "", value: "0" }] }));
  const removeVariableItem = (gk, id) => setVariableDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.filter((it) => it.id !== id) }));
  const cancelEditVariable = () => { setEditingVariable(false); setVariableDraft(null); };
  const saveEditVariable = () => {
    const finalGroups = variableDraft.map((g) => ({ ...g, items: g.items.map((it) => ({ id: it.id, name: (it.name || "").trim() || "รายการใหม่", value: parseNum(it.value, 0) })) }));
    persist({ ...allData, variableGroups: finalGroups });
    setEditingVariable(false); setVariableDraft(null);
  };

  const lastUpdatedLabel = allData.lastUpdated ? formatThaiDateTime(new Date(allData.lastUpdated)) : "ยังไม่มีการอัปเดตข้อมูล";
  const liquidGroup = displayAssetGroups.find((g) => g.key === "liquid") || displayAssetGroups[0];

  return (
    <div style={{ minHeight: "100vh", background: "#F6F3EC", padding: "28px 16px 60px", display: "flex", justifyContent: "center" }}>
      <div style={{ width: "100%", maxWidth: 480 }}>
        <div style={{ marginBottom: 22 }}>
          <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, letterSpacing: "0.1em", color: "#AD8A2E", fontWeight: 600, textTransform: "uppercase" }}>
            HAPPY MONEY · ข้อมูลล่าสุด {lastUpdatedLabel}
          </div>
          <h1 style={{ fontFamily: "'Noto Serif Thai', serif", fontWeight: 700, fontSize: 24, color: "#202B29", margin: "6px 0 0" }}>ภาพรวมการเงิน</h1>
          <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, color: "#6B6459", marginTop: 4 }}>
            Dashboard ประจำเดือน{CURRENT_MONTH_FULL}
          </div>
        </div>

        <div style={{ background: "#FFFFFF", border: "1px solid #E6E0D2", borderRadius: 18, padding: "20px 20px 22px", marginBottom: 16 }}>
          <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, color: "#6B6459" }}>ความมั่งคั่งสุทธิ (สินทรัพย์ − หนี้สิน)</div>
          <div style={{ fontFamily: "'Noto Serif Thai', serif", fontWeight: 700, fontSize: 34, color: "#202B29", margin: "4px 0 16px" }}>{fmt(netWorth)}</div>
          <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, marginBottom: 5 }}>
            <span style={{ color: "#2F5D46", fontWeight: 600 }}>สินทรัพย์รวม</span>
            <span style={{ color: "#202B29", fontWeight: 700 }}>{fmt(totalAssets)}</span>
          </div>
          <div style={{ width: "100%", height: 10, borderRadius: 999, background: "#EDE8DC", overflow: "hidden" }}>
            <div style={{ width: "100%", height: "100%", background: "#2F5D46" }} />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, margin: "12px 0 5px" }}>
            <span style={{ color: "#7A2E1F", fontWeight: 600 }}>หนี้สินรวม</span>
            <span style={{ color: "#202B29", fontWeight: 700 }}>{fmt(totalLiab)}</span>
          </div>
          <div style={{ width: "100%", height: 10, borderRadius: 999, background: "#EDE8DC", overflow: "hidden" }}>
            <div style={{ width: `${totalAssets ? (totalLiab / totalAssets) * 100 : 0}%`, height: "100%", background: "#7A2E1F" }} />
          </div>
          <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#6B6459", marginTop: 10 }}>
            หนี้สินคิดเป็น {pct(totalLiab, totalAssets)} ของสินทรัพย์รวม
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 24 }}>
          <StatCard label={`รายรับ ${CURRENT_MONTH_ABBR}`} value={fmt(INCOME.total)} color="#1F6E6B" />
          <StatCard label={`รายจ่าย ${CURRENT_MONTH_ABBR}`} value={fmt(totalExpense)} sub={`คงที่ ${fmt(fixedTotal)} + ผันแปร ${fmt(variableTotal)}`} color="#8A5A2B" />
          <StatCard label="คงเหลือสุทธิเดือนนี้" value={fmt(netCashflow)} sub={netCashflow >= 0 ? `อัตราการออม ${pct(netCashflow, INCOME.total)}` : "รายจ่ายสูงกว่ารายรับเดือนนี้"} color={netCashflow >= 0 ? "#202B29" : "#7A2E1F"} />
          <StatCard label="สินทรัพย์สภาพคล่อง" value={fmt(liquidGroup ? liquidGroup.value : 0)} sub="เงินสด/บัญชีออมทรัพย์" color="#202B29" />
        </div>

        <div style={{ marginBottom: 24 }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 10 }}>
            <SectionTitle eyebrow="สินทรัพย์" title={`รวม ${fmt(totalAssets)}`} />
            <EditToggle editing={editingAssets} onStart={startEditAssets} onSave={saveEditAssets} onCancel={cancelEditAssets} startLabel="แก้ไขรายการ" />
          </div>
          <CompositionBar groups={displayAssetGroups} total={totalAssets} />
          {editingAssets ? (
            <GroupEditor groups={assetDraft} onChangeValue={updateAssetValue} onChangeName={updateAssetName} onAddItem={addAssetItem} onRemoveItem={removeAssetItem} />
          ) : (
            <GroupList groups={displayAssetGroups} total={totalAssets} />
          )}
          {editingAssets && <div style={hintStyle}>เพิ่ม/ลบรายการ แก้ชื่อและยอดเงินได้ แล้วกด "บันทึก" เพื่อจำการเปลี่ยนแปลงไว้ใช้ครั้งถัดไป</div>}
        </div>

        <div style={{ marginBottom: 24 }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 10 }}>
            <SectionTitle eyebrow="หนี้สิน" title={`รวม ${fmt(totalLiab)}`} />
            <EditToggle editing={editingLiabilities} onStart={startEditLiabilities} onSave={saveEditLiabilities} onCancel={cancelEditLiabilities} startLabel="แก้ไขรายการ" />
          </div>
          <CompositionBar groups={displayLiabilityGroups} total={totalLiab} />
          {editingLiabilities ? (
            <GroupEditor groups={liabilityDraft} onChangeValue={updateLiabilityValue} onChangeName={updateLiabilityName} onAddItem={addLiabilityItem} onRemoveItem={removeLiabilityItem} />
          ) : (
            <GroupList groups={displayLiabilityGroups} total={totalLiab} />
          )}
          {editingLiabilities && <div style={hintStyle}>เพิ่ม/ลบรายการ แก้ชื่อและยอดเงินได้ แล้วกด "บันทึก" เพื่อจำการเปลี่ยนแปลงไว้ใช้ครั้งถัดไป</div>}
        </div>

        <div style={{ marginBottom: 24 }}>
          <SectionTitle eyebrow={`กระแสเงินสด · ${CURRENT_MONTH_FULL}`} title="รายรับ vs รายจ่าย" />
          <div style={{ background: "#FFFFFF", border: "1px solid #E6E0D2", borderRadius: 14, padding: 16 }}>
            <div style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, marginBottom: 5 }}>
                <span style={{ color: "#1F6E6B", fontWeight: 600 }}>รายรับ</span>
                <span style={{ fontWeight: 700, color: "#202B29" }}>{fmt(INCOME.total)}</span>
              </div>
              <div style={{ width: "100%", height: 12, borderRadius: 999, background: "#EDE8DC" }}>
                <div style={{ width: "100%", height: "100%", borderRadius: 999, background: "#1F6E6B" }} />
              </div>
            </div>
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, marginBottom: 5 }}>
                <span style={{ color: "#8A5A2B", fontWeight: 600 }}>รายจ่าย</span>
                <span style={{ fontWeight: 700, color: "#202B29" }}>{fmt(totalExpense)}</span>
              </div>
              <div style={{ width: "100%", height: 12, borderRadius: 999, background: "#EDE8DC" }}>
                <div style={{ width: `${Math.min((totalExpense / INCOME.total) * 100, 100)}%`, height: "100%", borderRadius: 999, background: "#8A5A2B" }} />
              </div>
            </div>
            <div style={{ marginTop: 14, paddingTop: 12, borderTop: "1px dashed #E6E0D2", display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, color: "#6B6459" }}>คงเหลือสุทธิ</span>
              <span style={{ fontFamily: "'Noto Serif Thai', serif", fontWeight: 700, fontSize: 20, color: netCashflow >= 0 ? "#202B29" : "#7A2E1F" }}>{fmt(netCashflow)}</span>
            </div>
            {netCashflow < 0 && (
              <div style={{ marginTop: 6, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#7A2E1F" }}>
                รายจ่ายรวมสูงกว่ารายรับ {fmt(Math.abs(netCashflow))} บาทในเดือนนี้
              </div>
            )}
          </div>
        </div>

        <div style={{ marginBottom: 8 }}>
          <SectionTitle eyebrow="รายจ่ายแยกตามหมวด" title={`รวม ${fmt(totalExpense)}`} />
          <CompositionBar groups={expenseSplit} total={totalExpense} />
          <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#6B6459", margin: "6px 0 18px" }}>
            <span>คงที่ {fmt(fixedTotal)} ({pct(fixedTotal, totalExpense)})</span>
            <span>ผันแปร {fmt(variableTotal)} ({pct(variableTotal, totalExpense)})</span>
          </div>

          <div style={{ background: "#FFFFFF", border: "1px solid #E6E0D2", borderRadius: 14, padding: 16, marginBottom: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
              <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 600, color: "#202B29" }}>เช็คลิสต์การจ่ายเดือนนี้</span>
              <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12, color: "#6B6459" }}>{paidCount}/{checklistItems.length} รายการ</span>
            </div>
            <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11, marginBottom: 8, color: syncError ? "#7A2E1F" : DRIVE_CONFIGURED ? "#2F5D46" : "#AD8A2E" }}>
              {!loaded
                ? "กำลังโหลด..."
                : syncError
                ? "⚠️ ซิงก์ Google Drive ไม่สำเร็จ (เช็คอินเทอร์เน็ต/URL) — ใช้ข้อมูลล่าสุดที่มีอยู่ไปก่อน"
                : DRIVE_CONFIGURED
                ? "☁️ ซิงก์กับ Google Drive แล้ว — เปิดจากเครื่องไหนก็เห็นเหมือนกัน"
                : "ยังไม่ได้ตั้งค่า Google Drive — ข้อมูลเก็บไว้ในเบราว์เซอร์นี้ก่อน"}
            </div>
            <div style={{ width: "100%", height: 8, borderRadius: 999, background: "#EDE8DC", overflow: "hidden" }}>
              <div style={{ width: `${checklistItems.length ? (paidCount / checklistItems.length) * 100 : 0}%`, height: "100%", background: "#2F5D46", transition: "width .25s" }} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#6B6459" }}>
              <span>จ่ายแล้ว {fmt(paidSum)} จาก {fmt(totalExpense)}</span>
              <button onClick={resetChecklist} style={{ background: "none", border: "none", color: "#AD8A2E", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, cursor: "pointer", padding: 0 }}>ล้างเช็คลิสต์</button>
            </div>
          </div>

          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 2 }}>
            <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 600, color: "#8A5A2B" }}>รายจ่ายคงที่ · หักอัตโนมัติวันที่ 1 ทุกเดือน</span>
            <EditToggle editing={editingFixed} onStart={startEditFixed} onSave={saveEditFixed} onCancel={cancelEditFixed} startLabel="แก้ไขรายการ" />
          </div>
          {editingFixed ? (
            <GroupEditor groups={fixedDraft} onChangeValue={updateFixedValue} onChangeName={updateFixedName} onAddItem={addFixedItem} onRemoveItem={removeFixedItem} />
          ) : (
            <GroupList groups={displayFixedGroups} total={fixedTotal} checkable paid={paid} onToggle={togglePaid} />
          )}
          {editingFixed && <div style={hintStyle}>เพิ่ม/ลบรายการ แก้ชื่อและยอดเงินได้ แล้วกด "บันทึก" เพื่อจำการเปลี่ยนแปลงไว้ใช้ครั้งถัดไป</div>}

          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, margin: "20px 0 10px" }}>
            <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 600, color: "#8A5A2B" }}>รายจ่ายผันแปร · ตามรายวัน (แตะหมวดเพื่อดูรายละเอียด)</span>
            <EditToggle editing={editingVariable} onStart={startEditVariable} onSave={saveEditVariable} onCancel={cancelEditVariable} startLabel="แก้ไขรายการ" />
          </div>
          {editingVariable ? (
            <GroupEditor groups={variableDraft} onChangeValue={updateVariableValue} onChangeName={updateVariableName} onAddItem={addVariableItem} onRemoveItem={removeVariableItem} />
          ) : (
            <GroupList groups={displayVariableGroups} total={variableTotal} checkable paid={paid} onToggle={togglePaid} />
          )}
          {editingVariable && <div style={hintStyle}>เพิ่ม/ลบรายการ แก้ชื่อและยอดเงินได้ แล้วกด "บันทึก" เพื่อจำการเปลี่ยนแปลงไว้ใช้ครั้งถัดไป</div>}
        </div>

        <div style={{ marginTop: 18, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11, color: "#8C8577", lineHeight: 1.6 }}>
          หมายเหตุ: กด "แก้ไขรายการ" ในหมวดสินทรัพย์ หนี้สิน หรือรายจ่าย เพื่อเพิ่ม/ลบ/เปลี่ยนชื่อและยอดของแต่ละรายการ แตะรายการในเช็คลิสต์เพื่อติ๊กว่าจ่ายแล้ว เช็คลิสต์จะรีเซ็ตเองอัตโนมัติทุกวันที่ 1 ของเดือนใหม่ "ข้อมูลล่าสุด" ด้านบนจะอัปเดตทุกครั้งที่มีการแก้ไขยอดเงินหรือติ๊ก/ยกเลิกติ๊ก สถานะทั้งหมดจะซิงก์ขึ้น Google Drive ของคุณ (ผ่าน Google Apps Script) เปิดเว็บนี้จากอุปกรณ์ไหนก็เห็นข้อมูลเดียวกัน
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
