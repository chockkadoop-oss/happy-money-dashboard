// Date helpers for the annual-bills reminders (date-only, no time component).
function parseISODate(str) {
  if (!str) return null;
  const [y, m, d] = str.split("-").map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
}
function startOfToday() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}
function addMonths(d, months) {
  return new Date(d.getFullYear(), d.getMonth() + months, d.getDate());
}
function daysInMonth(year, monthIndex0) {
  return new Date(year, monthIndex0 + 1, 0).getDate();
}
// Cadences of 3/6/12 months default the reminder to the 1st of the due month
// (a sensible starting point), but the exact date stays freely editable.
function fixesToDay1(repeatMonths) {
  const m = Number(repeatMonths) || 0;
  return m === 3 || m === 6 || m === 12;
}
function forceDay1(dateStr) {
  if (!dateStr) return dateStr;
  const parts = dateStr.split("-");
  return parts.length === 3 ? `${parts[0]}-${parts[1]}-01` : dateStr;
}
// Next occurrence of a day-of-month reminder (for monthly fixed/variable
// items), clamped so e.g. day 31 in February safely becomes the last day of
// that month instead of overflowing into March.
function nextMonthlyDate(dueDay) {
  const day = Number(dueDay) || 0;
  if (day <= 0) return null;
  const today = startOfToday();
  let y = today.getFullYear(), m = today.getMonth();
  let candidate = new Date(y, m, Math.min(day, daysInMonth(y, m)));
  if (candidate < today) {
    m += 1;
    if (m > 11) { m = 0; y += 1; }
    candidate = new Date(y, m, Math.min(day, daysInMonth(y, m)));
  }
  return candidate;
}
// Rolls a bill's anchor due date forward by its repeat cycle until it lands
// on today or later — so a quarterly bill from months ago still shows its
// next real due date instead of looking permanently overdue.
function nextOccurrence(dueDateStr, repeatMonths) {
  const anchor = parseISODate(dueDateStr);
  if (!anchor) return null;
  const months = Number(repeatMonths) || 0;
  if (months <= 0) return anchor;
  const today = startOfToday();
  let d = anchor;
  let guard = 0;
  while (d < today && guard < 2000) {
    d = addMonths(d, months);
    guard++;
  }
  return d;
}
function daysUntilDate(d) {
  if (!d) return null;
  return Math.round((d - startOfToday()) / 86400000);
}

}

// Recomputes each group's total from its (possibly edited) items.
function withTotals(groups) {
  return groups.map((g) => ({ ...g, value: g.items.reduce((s, it) => s + (Number(it.value) || 0), 0) }));
}
// While a section is being edited, show live totals from the in-progress draft
// (string values); otherwise just show the saved totals.
function liveGroups(baseGroupsT, editing, draft) {
  if (!editing || !draft) return baseGroupsT;
  return draft.map((g) => {
    const items = g.items.map((it) => ({ ...it, value: parseNum(it.value, 0) }));
    const value = items.reduce((s, it) => s + it.value, 0);
    return { ...g, items, value };
  });
}
function cloneAsDraft(groups) {
  return groups.map((g) => ({ ...g, items: g.items.map((it) => ({ ...it, value: String(it.value) })) }));
}
// Moves `draggedId` to sit where `targetId` currently is within its group
// (used by the drag-and-drop reordering for assets/liabilities).
function reorderItemInGroups(groups, groupKey, draggedId, targetId) {
  if (draggedId === targetId) return groups;
  return groups.map((g) => {
    if (g.key !== groupKey) return g;
    const items = [...g.items];
    const fromIdx = items.findIndex((it) => it.id === draggedId);
    const toIdx = items.findIndex((it) => it.id === targetId);
    if (fromIdx === -1 || toIdx === -1) return g;
    const [moved] = items.splice(fromIdx, 1);
    items.splice(toIdx, 0, moved);
    return { ...g, items };
  });
}
function clampDueDay(value) {
  const n = parseInt(value, 10);
  if (!n || n < 1) return null;
  return Math.min(31, n);
}
// Compact "ก.ค.69" style label from a "2569-07" month key, for chart axes.
function monthLabelFromKey(key) {
  const [yearStr, moStr] = key.split("-");
  const mo = parseInt(moStr, 10) - 1;
  return `${THAI_MONTHS_ABBR[mo]}${yearStr.slice(-2)}`;
}
// Computes the whole-dashboard summary (net worth, income/expense, etc.) for a
// given allData-shaped object. Used to freeze a month-end snapshot into
// allData.history every time something is saved.
function computeSnapshot(data) {
  const aGroups = withTotals(data.assetGroups || DEFAULT_ASSET_GROUPS);
  const lGroups = withTotals(data.liabilityGroups || DEFAULT_LIABILITY_GROUPS);
  const fGroups = withTotals(data.fixedGroups || DEFAULT_FIXED_EXPENSE_GROUPS);
  const vGroups = withTotals(data.variableGroups || DEFAULT_VARIABLE_EXPENSE_GROUPS);
  const totalAssets = aGroups.reduce((s, g) => s + g.value, 0);
  const totalLiab = lGroups.reduce((s, g) => s + g.value, 0);
  const fixedTotal = fGroups.reduce((s, g) => s + g.value, 0);
  const variableTotal = vGroups.reduce((s, g) => s + g.value, 0);
  const totalExpense = fixedTotal + variableTotal;
  const items = [
    ...(data.fixedGroups || DEFAULT_FIXED_EXPENSE_GROUPS).flatMap((g) => g.items),
    ...(data.variableGroups || DEFAULT_VARIABLE_EXPENSE_GROUPS).flatMap((g) => g.items),
  ];
  const monthPaid = data[MONTH_KEY] || {};
  const paidCount = items.filter((it) => monthPaid[it.id]).length;
  return {
    netWorth: totalAssets - totalLiab, totalAssets, totalLiab,
    income: INCOME.total, totalExpense, fixedTotal, variableTotal, netCashflow: INCOME.total - totalExpense,
    paidCount, totalItems: items.length,
  };
}

// One-time migration: if a section has never been saved before (its key is
// missing from the loaded data), seed it from the built-in starting defaults
// exactly once. The caller then writes the result back to storage, so from
// that point on the SAVED copy is what's used — future code updates can
// change or remove the DEFAULT_* constants entirely without ever touching
// data that's already been seeded/edited.
function seedMissingDefaults(data) {
  const seeded = { ...data };
  let changed = false;
  if (!seeded.assetGroups) { seeded.assetGroups = DEFAULT_ASSET_GROUPS; changed = true; }
  if (!seeded.liabilityGroups) { seeded.liabilityGroups = DEFAULT_LIABILITY_GROUPS; changed = true; }
  if (!seeded.fixedGroups) { seeded.fixedGroups = DEFAULT_FIXED_EXPENSE_GROUPS; changed = true; }
  if (!seeded.variableGroups) { seeded.variableGroups = DEFAULT_VARIABLE_EXPENSE_GROUPS; changed = true; }
  if (!seeded.annualBills) { seeded.annualBills = DEFAULT_ANNUAL_BILLS; changed = true; }
  return { seeded, changed };
}

// Month-by-month bar chart that can switch between several metrics via tabs.
// Tap a bar to see that month's value + change vs the previous month.
function MonthlyTrendChart({ history, currentKey }) {
  const [metricKey, setMetricKey] = useState("netWorth");
  const [selected, setSelected] = useState(null);
  if (!history.length) return null;
  const metric = TREND_METRICS.find((m) => m.key === metricKey) || TREND_METRICS[0];

  const values = history.map((h) => Number(h[metric.key]) || 0);
  const maxPos = Math.max(...values, 0, 1);
  const minNeg = Math.min(...values, 0);
  const hasNegative = metric.allowNegative && minNeg < 0;

  const activeKey = selected && history.some((h) => h.key === selected) ? selected : currentKey;
  const activeIdx = history.findIndex((h) => h.key === activeKey);
  const activeEntry = history[activeIdx] || history[history.length - 1];
  const activeVal = Number(activeEntry[metric.key]) || 0;
  const prevEntry = activeIdx > 0 ? history[activeIdx - 1] : null;
  const diff = prevEntry ? activeVal - (Number(prevEntry[metric.key]) || 0) : null;
  const dense = history.length > 7;
  const CH = 110;
  const zoneH = hasNegative ? CH / 2 : CH;

  return (
    <div>
      <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 8, marginBottom: 4 }}>
        {TREND_METRICS.map((m) => (
          <button key={m.key} onClick={() => setMetricKey(m.key)}
            style={{
              flexShrink: 0, padding: "6px 11px", borderRadius: 999, cursor: "pointer", whiteSpace: "nowrap",
              fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12,
              border: m.key === metricKey ? "1px solid #AD8A2E" : "1px solid #E6E0D2",
              background: m.key === metricKey ? "#FBF3DE" : "#FFFFFF",
              color: m.key === metricKey ? "#8A6B1E" : "#6B6459",
              fontWeight: m.key === metricKey ? 600 : 400,
            }}>{m.label}</button>
        ))}
      </div>

      <div style={{ display: "flex", alignItems: "flex-end", justifyContent: dense ? "flex-start" : "center", gap: dense ? 8 : 16, height: CH, overflowX: "auto" }}>
        {history.map((h) => {
          const val = Number(h[metric.key]) || 0;
          const isActive = h.key === activeEntry.key;
          const isCurrent = h.key === currentKey;
          const barColor = val < 0 ? (metric.negativeColor || "#7A2E1F") : metric.color;
          const opacity = isActive ? 1 : isCurrent ? 0.85 : 0.4;
          const barH = hasNegative
            ? Math.max((Math.abs(val) / (val >= 0 ? maxPos : Math.abs(minNeg))) * zoneH, 3)
            : Math.max((Math.max(val, 0) / maxPos) * zoneH, 3);
          return (
            <button key={h.key} onClick={() => setSelected(h.key)} title={`${monthLabelFromKey(h.key)}: ${fmt(val)}`}
              style={{ display: "flex", flexDirection: "column", justifyContent: hasNegative ? "flex-start" : "flex-end", height: "100%", background: "none", border: "none", cursor: "pointer", padding: 0, flexShrink: 0 }}>
              {hasNegative ? (
                <React.Fragment>
                  <div style={{ height: zoneH, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
                    {val >= 0 && <div style={{ width: 22, height: barH, borderRadius: "6px 6px 0 0", background: barColor, opacity, transition: "opacity .15s" }} />}
                  </div>
                  <div style={{ height: 1, background: "#C9C2B2" }} />
                  <div style={{ height: zoneH, display: "flex", alignItems: "flex-start", justifyContent: "center" }}>
                    {val < 0 && <div style={{ width: 22, height: barH, borderRadius: "0 0 6px 6px", background: barColor, opacity, transition: "opacity .15s" }} />}
                  </div>
                </React.Fragment>
              ) : (
                <div style={{ width: 22, height: barH, borderRadius: "6px 6px 0 0", background: barColor, opacity, transition: "opacity .15s" }} />
              )}
            </button>
          );
        })}
      </div>
      <div style={{ display: "flex", justifyContent: dense ? "flex-start" : "center", gap: dense ? 8 : 16, marginTop: 4, overflowX: "auto" }}>
        {history.map((h) => (
          <span key={h.key} style={{ width: 22, flexShrink: 0, textAlign: "center", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 10, color: h.key === activeEntry.key ? "#AD8A2E" : "#A79E8E" }}>
            {monthLabelFromKey(h.key)}
          </span>
        ))}
      </div>
      <div style={{ marginTop: 14, paddingTop: 12, borderTop: "1px dashed #E6E0D2" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, color: "#6B6459" }}>{metric.label} · {monthLabelFromKey(activeEntry.key)}</span>
          <span style={{ fontFamily: "'Noto Serif Thai', serif", fontWeight: 700, fontSize: 19, color: activeVal < 0 ? (metric.negativeColor || "#7A2E1F") : "#202B29" }}>
            {activeVal < 0 ? "−" : ""}{fmt(Math.abs(activeVal))}
          </span>
        </div>
        {diff !== null && (
          <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: diff >= 0 ? "#2F5D46" : "#7A2E1F", marginTop: 3 }}>
            {diff >= 0 ? "▲ เพิ่มขึ้น" : "▼ ลดลง"} {fmt(Math.abs(diff))} จากเดือนก่อน
          </div>
        )}
      </div>
    </div>
  );
}

// Read-only (or checkable) list of groups + items. Used for assets, liabilities,
// and — when not being edited — the fixed/variable expense checklists.
function GroupList({ groups, total, checkable = false, paid = {}, onToggle, showDueInfo = false }) {
  const [open, setOpen] = useState(null);
  return (
    <div style={{ marginTop: 14 }}>
      {groups.map((g) => {
        // When due-day info is shown, list items with a due day soonest-first;
        // items with no due day set keep their original order after those.
        const items = showDueInfo
          ? [...g.items].sort((a, b) => {
              const da = nextMonthlyDate(a.dueDay);
              const db = nextMonthlyDate(b.dueDay);
              if (da && db) return da - db;
              if (da) return -1;
              if (db) return 1;
              return 0;
            })
          : g.items;
        return (
        <div key={g.key} style={{ borderBottom: "1px solid #E6E0D2" }}>
          <button
            onClick={() => setOpen(open === g.key ? null : g.key)}
            style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 2px", background: "transparent", border: "none", cursor: "pointer", textAlign: "left" }}
          >
            <span style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ width: 10, height: 10, borderRadius: 3, background: g.color, flexShrink: 0 }} />
              <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 600, fontSize: 14, color: "#202B29" }}>{g.label}</span>
              {checkable && (() => {
                const unpaidCount = items.filter((it) => !paid[it.id]).length;
                return unpaidCount > 0 ? (
                  <span title={`ยังไม่ได้ติ๊ก ${unpaidCount} รายการ`}
                    style={{ minWidth: 16, height: 16, padding: "0 5px", borderRadius: 999, background: "#F0C674", color: "#5C4A1A", fontSize: 10, fontWeight: 700, display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    {unpaidCount}
                  </span>
                ) : null;
              })()}
            </span>

            <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, color: "#6B6459" }}>{pct(g.value, total)}</span>
              <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 700, fontSize: 14, color: "#202B29" }}>{fmt(g.value)}</span>
              <span style={{ fontSize: 12, color: "#6B6459", transform: open === g.key ? "rotate(180deg)" : "none", transition: "transform .2s" }}>▾</span>
            </span>
          </button>
          {open === g.key && (
            <div style={{ padding: "0 2px 12px 22px", display: "flex", flexDirection: "column", gap: 8 }}>
              {items.length === 0 && (
                <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, color: "#A79E8E" }}>ไม่มีรายการ</div>
              )}
              {items.map((it) => {
                const isPaid = checkable && !!paid[it.id];
                const dueNext = showDueInfo ? nextMonthlyDate(it.dueDay) : null;
                const dueDays = dueNext ? daysUntilDate(dueNext) : null;
                const overdue = dueDays !== null && dueDays < 0;
                const soon = dueDays !== null && dueDays >= 0 && dueDays <= REMINDER_WINDOW_DAYS;
                return (
                  <div key={it.id} onClick={checkable ? () => onToggle(it.id) : undefined}
                    style={{ display: "flex", alignItems: "center", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, cursor: checkable ? "pointer" : "default" }}>
                    <span style={{ display: "flex", alignItems: "center", gap: 8, color: isPaid ? "#A79E8E" : "#6B6459", minWidth: 0 }}>
                      {checkable && (
                        <span style={{ width: 16, height: 16, borderRadius: 5, border: `1.5px solid ${isPaid ? "#2F5D46" : "#C9C2B2"}`, background: isPaid ? "#2F5D46" : "transparent", display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 10, color: "#fff" }}>
                          {isPaid ? "✓" : ""}
                        </span>
                      )}
                      <span style={{ minWidth: 0 }}>
                        <span style={{ textDecoration: isPaid ? "line-through" : "none", display: "block" }}>{it.name || "(ไม่มีชื่อ)"}</span>
                        {dueNext && (
                          <span style={{ display: "block", fontSize: 11, marginTop: 1, color: overdue ? "#7A2E1F" : soon ? "#AD8A2E" : "#A79E8E" }}>
                            ทุกวันที่ {it.dueDay} · {overdue ? "เลยกำหนดแล้ว" : soon ? `อีก ${dueDays} วัน` : formatDate(dueNext)}
                          </span>
                        )}
                      </span>
                    </span>
                    <span style={{ color: isPaid ? "#A79E8E" : "#202B29", textDecoration: isPaid ? "line-through" : "none", flexShrink: 0, marginLeft: 8 }}>{fmt(it.value)}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        );
      })}
    </div>
  );
}

const inputTextStyle = { flex: 1, minWidth: 0, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, border: "1px solid #C9C2B2", borderRadius: 7, padding: "6px 8px", color: "#202B29", background: "#FFFDF8" };
const inputNumberStyle = { width: 108, textAlign: "right", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, border: "1px solid #C9C2B2", borderRadius: 7, padding: "6px 8px", color: "#202B29", background: "#FFFDF8", flexShrink: 0 };
const removeBtnStyle = { width: 28, height: 28, borderRadius: 7, border: "1px solid #E0A9A0", background: "#FBEDEA", color: "#9A3B2E", cursor: "pointer", fontSize: 13, flexShrink: 0 };
const addBtnStyle = { marginTop: 8, background: "none", border: "1px dashed #C9C2B2", borderRadius: 7, padding: "6px 10px", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12, color: "#6B6459", cursor: "pointer" };
const editBtnStyle = { background: "none", border: "1px solid #C9C2B2", borderRadius: 8, padding: "5px 12px", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12, color: "#6B6459", cursor: "pointer", whiteSpace: "nowrap" };
const saveBtnStyle = { background: "#2F5D46", border: "1px solid #2F5D46", borderRadius: 8, padding: "5px 12px", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12, color: "#fff", cursor: "pointer" };
const cancelBtnStyle = { background: "none", border: "1px solid #C9C2B2", borderRadius: 8, padding: "5px 12px", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12, color: "#6B6459", cursor: "pointer" };
const hintStyle = { fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11, color: "#AD8A2E", marginTop: 6 };

// Editable version of a group list: number input always, name input + add/remove
// only when the section supports full item management (the expense checklists).
// When allowCategoryManagement is on, whole categories (groups) can also be
// renamed, added, or removed — used for expense sections only. allowReorder
// turns on drag-and-drop reordering (via pointer events, so it works with
// both mouse and touch) using a small grip handle per item.
function GroupEditor({ groups, onChangeValue, onChangeName, onAddItem, onRemoveItem, editableName = true, allowAddRemove = true, allowCategoryManagement = false, onRenameGroup, onAddGroup, onRemoveGroup, allowDueDay = false, onChangeDueDay, allowReorder = false, onReorderItem }) {
  const itemRefs = useRef({});
  const groupsRef = useRef(groups);
  groupsRef.current = groups;
  const [drag, setDrag] = useState(null); // { groupKey, id }

  useEffect(() => {
    if (!drag) return;
    const handleMove = (e) => {
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const group = groupsRef.current.find((g) => g.key === drag.groupKey);
      if (!group) return;
      let hoverId = null;
      for (const it of group.items) {
        const node = itemRefs.current[it.id];
        if (!node) continue;
        const rect = node.getBoundingClientRect();
        if (clientY >= rect.top && clientY <= rect.bottom) { hoverId = it.id; break; }
      }
      if (hoverId && hoverId !== drag.id) {
        onReorderItem(drag.groupKey, drag.id, hoverId);
      }
    };
    const handleUp = () => setDrag(null);
    window.addEventListener("pointermove", handleMove);
    window.addEventListener("pointerup", handleUp);
    window.addEventListener("pointercancel", handleUp);
    return () => {
      window.removeEventListener("pointermove", handleMove);
      window.removeEventListener("pointerup", handleUp);
      window.removeEventListener("pointercancel", handleUp);
    };
  }, [drag]);

  return (
    <div style={{ marginTop: 14 }}>
      {groups.map((g) => {
        const groupTotal = g.items.reduce((s, it) => s + parseNum(it.value, 0), 0);
        return (
          <div key={g.key} style={{ border: "1px solid #E6E0D2", borderRadius: 12, padding: 12, marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, gap: 8 }}>
              <span style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
                <span style={{ width: 10, height: 10, borderRadius: 3, background: g.color, flexShrink: 0 }} />
                {allowCategoryManagement ? (
                  <input type="text" value={g.label} placeholder="ชื่อหมวดหมู่"
                    onChange={(e) => onRenameGroup(g.key, e.target.value)}
                    style={{ ...inputTextStyle, fontWeight: 600 }} />
                ) : (
                  <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 600, fontSize: 14, color: "#202B29" }}>{g.label}</span>
                )}
              </span>
              <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, fontWeight: 700, color: "#202B29", flexShrink: 0 }}>{fmt(groupTotal)}</span>
              {allowCategoryManagement && (
                <button onClick={() => onRemoveGroup(g.key)} title="ลบหมวดหมู่นี้ทั้งหมด" style={removeBtnStyle}>✕</button>
              )}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {g.items.map((it, idx) => {
                const isDragging = !!drag && drag.id === it.id;
                return (
                  <div key={it.id}
                    ref={(el) => { if (el) itemRefs.current[it.id] = el; }}
                    style={{
                      display: "flex", flexDirection: "column", gap: 6, paddingBottom: 8,
                      borderBottom: idx < g.items.length - 1 ? "1px dashed #EDE8DC" : "none",
                      opacity: isDragging ? 0.55 : 1,
                      background: isDragging ? "#FBF3DE" : "transparent",
                      borderRadius: isDragging ? 8 : 0,
                      transition: "opacity .1s",
                    }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      {allowReorder && (
                        <span
                          onPointerDown={(e) => { e.preventDefault(); setDrag({ groupKey: g.key, id: it.id }); }}
                          title="ลากเพื่อจัดลำดับ"
                          style={{ cursor: "grab", touchAction: "none", userSelect: "none", color: "#A79E8E", fontSize: 17, flexShrink: 0, padding: "0 4px", lineHeight: 1 }}>⠿</span>
                      )}
                      {editableName ? (
                        <input type="text" value={it.name} placeholder="ชื่อรายการ"
                          onChange={(e) => onChangeName(g.key, it.id, e.target.value)}
                          style={inputTextStyle} />
                      ) : (
                        <span style={{ flex: 1, minWidth: 0, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, color: "#6B6459" }}>{it.name}</span>
                      )}
                      <input type="number" inputMode="decimal" value={it.value} placeholder="0"
                        onChange={(e) => onChangeValue(g.key, it.id, e.target.value)}
                        style={inputNumberStyle} />
                      {allowAddRemove && (
                        <button onClick={() => onRemoveItem(g.key, it.id)} title="ลบรายการ" style={removeBtnStyle}>✕</button>
                      )}
                    </div>
                    {allowDueDay && (
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#A79E8E" }}>ครบกำหนดวันที่ (1–31) ของทุกเดือน:</span>
                        <input type="number" min="1" max="31" value={it.dueDay || ""} placeholder="ไม่ระบุ"
                          onChange={(e) => onChangeDueDay(g.key, it.id, e.target.value)}
                          style={{ width: 70, textAlign: "right", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, border: "1px solid #C9C2B2", borderRadius: 7, padding: "4px 6px", color: "#202B29", background: "#FFFDF8" }} />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            {allowAddRemove && (
              <button onClick={() => onAddItem(g.key)} style={addBtnStyle}>+ เพิ่มรายการ</button>
            )}
          </div>
        );
      })}
      {allowCategoryManagement && (
        <button onClick={onAddGroup} style={{ ...addBtnStyle, width: "100%", textAlign: "center", borderStyle: "solid", borderColor: "#AD8A2E", color: "#AD8A2E" }}>+ เพิ่มหมวดหมู่ใหม่</button>
      )}
    </div>
  );
}

// Read-only list of annual bills, soonest next occurrence first.
function AnnualBillsList({ bills }) {
  const [open, setOpen] = useState(null);
  const withNext = bills.map((b) => {
    const next = nextOccurrence(b.dueDate, b.repeatMonths);
    return { ...b, next, days: daysUntilDate(next) };
  });
  const groups = groupBillsByCadence(withNext).map((g) => ({
    ...g,
    value: g.items.reduce((s, b) => s + (Number(b.value) || 0), 0),
    color: CADENCE_COLORS[g.months] || "#8A5A2B",
  }));
  const grandTotal = groups.reduce((s, g) => s + g.value, 0);

  return (
    <div style={{ marginTop: 14 }}>
      {groups.length === 0 && <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, color: "#A79E8E" }}>ไม่มีรายการ</div>}
      {groups.map((g) => {
        const sorted = [...g.items].sort((a, b) => {
          if (!a.next) return 1;
          if (!b.next) return -1;

        });
        return (
          <div key={g.months} style={{ borderBottom: "1px solid #E6E0D2" }}>
            <button
              onClick={() => setOpen(open === g.months ? null : g.months)}

              <span style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ width: 10, height: 10, borderRadius: 3, background: g.color, flexShrink: 0 }} />
                <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 600, fontSize: 14, color: "#202B29" }}>{g.label}</span>
              </span>
              <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, color: "#6B6459" }}>{pct(g.value, grandTotal)}</span>
                <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 700, fontSize: 14, color: "#202B29" }}>{fmt(g.value)}</span>
                <span style={{ fontSize: 12, color: "#6B6459", transform: open === g.months ? "rotate(180deg)" : "none", transition: "transform .2s" }}>▾</span>
              </span>
            </button>
            {open === g.months && (
              <div style={{ padding: "0 2px 12px 22px", display: "flex", flexDirection: "column", gap: 10 }}>
                {sorted.map((b) => {
                  const overdue = b.days !== null && b.days < 0;
                  const soon = b.days !== null && b.days >= 0 && b.days <= REMINDER_WINDOW_DAYS;
                  return (
                    <div key={b.id} style={{ display: "flex", alignItems: "center", gap: 10, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13 }}>

                        กำหนด {formatDate(b.next)}

                      </div>
                      <span style={{ fontWeight: 700, color: "#202B29", flexShrink: 0, textAlign: "right", minWidth: 80 }}>{fmt(b.value)}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// Editable list of annual bills: name, amount, and due date, plus add/remove.
function AnnualBillsEditor({ bills, onChangeField, onAdd, onRemove }) {
  const dateInputStyle = { flex: 1, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, border: "1px solid #C9C2B2", borderRadius: 7, padding: "6px 8px", color: "#202B29", background: "#FFFDF8" };
  // Switching to a 3/6/12-month cadence defaults the due day to the 1st of
  // the month (of whatever date is already set, or this month if blank) —
  // just a convenient starting point; the date field stays fully editable.
  const handleRepeatChange = (b, months) => {
    onChangeField(b.id, "repeatMonths", months);
    if (fixesToDay1(months)) {
      const base = parseISODate(b.dueDate) || new Date();
      onChangeField(b.id, "dueDate", `${base.getFullYear()}-${String(base.getMonth() + 1).padStart(2, "0")}-01`);
    }
  };
  const groups = groupBillsByCadence(bills).map((g) => ({
    ...g,
    value: g.items.reduce((s, b) => s + parseNum(b.value, 0), 0),

  return (
    <div style={{ marginTop: 14 }}>
      {groups.map((g) => (
        <div key={g.months} style={{ border: "1px solid #E6E0D2", borderRadius: 12, padding: 12, marginBottom: 10 }}>

            <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ width: 10, height: 10, borderRadius: 3, background: g.color, flexShrink: 0 }} />
              <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 600, fontSize: 14, color: "#202B29" }}>{g.label}</span>
            </span>
            <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, fontWeight: 700, color: "#202B29" }}>{fmt(g.value)}</span>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {g.items.map((b) => (
              <div key={b.id} style={{ border: "1px solid #E6E0D2", borderRadius: 12, padding: 12, display: "flex", flexDirection: "column", gap: 8 }}>
                <div style={{ display: "flex", gap: 6 }}>
                  <input type="text" value={b.name} placeholder="ชื่อรายการ"
                    onChange={(e) => onChangeField(b.id, "name", e.target.value)} style={inputTextStyle} />
                  <button onClick={() => onRemove(b.id)} title="ลบรายการ" style={removeBtnStyle}>✕</button>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input type="number" inputMode="decimal" value={b.value} placeholder="0"
                    onChange={(e) => onChangeField(b.id, "value", e.target.value)}
                    style={{ ...inputNumberStyle, width: "auto", flex: 1 }} />
                  <input type="date" value={b.dueDate || ""}
                    onChange={(e) => onChangeField(b.id, "dueDate", e.target.value)}
                    style={dateInputStyle} />
                </div>
                <select value={Number(b.repeatMonths) || 0} onChange={(e) => handleRepeatChange(b, Number(e.target.value))}
                  style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, border: "1px solid #C9C2B2", borderRadius: 7, padding: "6px 8px", color: "#202B29", background: "#FFFDF8" }}>
                  {REPEAT_OPTIONS.map((opt) => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                </select>
              </div>
            ))}
          </div>
        </div>
      ))}
      <button onClick={onAdd} style={{ ...addBtnStyle, width: "100%", textAlign: "center", borderStyle: "solid", borderColor: "#AD8A2E", color: "#AD8A2E" }}>+ เพิ่มรายการ</button>
    </div>
  );
}

function EditToggle({ editing, onStart, onSave, onCancel, startLabel }) {
  return editing ? (
    <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
      <button onClick={onSave} style={saveBtnStyle}>บันทึก</button>
      <button onClick={onCancel} style={cancelBtnStyle}>ยกเลิก</button>
    </div>
  ) : (
    <button onClick={onStart} style={editBtnStyle}>{startLabel}</button>
  );
}

function StatCard({ label, value, sub, color }) {
  return (
    <div style={{ background: "#FFFFFF", border: "1px solid #E6E0D2", borderRadius: 14, padding: "14px 16px" }}>

      <div style={{ fontFamily: "'Noto Serif Thai', serif", fontWeight: 700, fontSize: 18, color: "#202B29", marginTop: 2 }}>{title}</div>

}

// Tracks viewport width so the layout can adapt: single column on phones,
// a bit more breathing room on tablets, and paired two-column sections on
// wide/desktop screens.
function useWindowWidth() {
  const [width, setWidth] = useState(typeof window !== "undefined" ? window.innerWidth : 480);
  useEffect(() => {
    const onResize = () => setWidth(window.innerWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return width;
}

function Dashboard() {
  // allData persists (via Google Drive bridge, or localStorage as a fallback):
  //   allData[MONTH_KEY]     -> which checklist items are ticked this month, by item id
  //   allData.assetGroups    -> saved asset groups (once edited)
  //   allData.liabilityGroups-> saved liability groups (once edited)
  //   allData.fixedGroups    -> saved fixed-expense groups (once edited/added/removed)
  //   allData.variableGroups -> saved variable-expense groups (once edited/added/removed)
  //   allData.history        -> { "2569-07": {netWorth, totalAssets, ...}, ... } — a frozen
  //                              month-end-ish snapshot per month, kept for the last 12 months
  //   allData.lastUpdated    -> ISO timestamp of the last edit or checkbox tick
  const [allData, setAllData] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [syncError, setSyncError] = useState(false);

  const [editingAssets, setEditingAssets] = useState(false);
  const [assetDraft, setAssetDraft] = useState(null);
  const [editingLiabilities, setEditingLiabilities] = useState(false);
  const [liabilityDraft, setLiabilityDraft] = useState(null);
  const [editingFixed, setEditingFixed] = useState(false);
  const [fixedDraft, setFixedDraft] = useState(null);
  const [editingVariable, setEditingVariable] = useState(false);
  const [variableDraft, setVariableDraft] = useState(null);
  const [editingAnnual, setEditingAnnual] = useState(false);
  const [annualDraft, setAnnualDraft] = useState(null);

  useEffect(() => {
    let mounted = true;

    // Loads whatever's saved, fills in any never-saved sections from the
    // built-in defaults, and — only the first time that happens — writes
    // the result back to storage so it becomes the permanent saved copy.
    const seedAndSet = (rawData, skipWriteBack) => {
      if (!mounted) return;
      const { seeded, changed } = seedMissingDefaults(rawData || {});
      setAllData(seeded);
      setLoaded(true);
      if (changed && !skipWriteBack) {
        if (!DRIVE_CONFIGURED) {
          try { localStorage.setItem(LOCAL_FALLBACK_KEY, JSON.stringify(seeded)); } catch (e) {}
        } else {
          fetch(DRIVE_API_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(seeded),
          }).catch(() => setSyncError(true));
        }
      }
    };

    if (!DRIVE_CONFIGURED) {
      try {
        const raw = localStorage.getItem(LOCAL_FALLBACK_KEY);
        seedAndSet(raw ? JSON.parse(raw) : {}, false);
      } catch (e) {
        seedAndSet({}, false);
      }
      return;
    }
    fetch(DRIVE_API_URL)
      .then((r) => r.json())
      .then((data) => seedAndSet(data, false))
      .catch(() => { if (mounted) setSyncError(true); seedAndSet({}, true); });
    return () => { mounted = false; };
  }, []);

  // Every call to persist() represents a real update (amount edit or checkbox
  // tick), so it also stamps "last updated" for the header, and freezes a
  // snapshot of the whole dashboard into history[MONTH_KEY] — trimmed to the
  // most recent 12 months — so past months build up a comparable trend.
  const persist = (nextAllData) => {
    const mergedHistory = { ...(nextAllData.history || {}), [MONTH_KEY]: { ...computeSnapshot(nextAllData), updatedAt: new Date().toISOString() } };
    const keptKeys = Object.keys(mergedHistory).sort().slice(-12);
    const trimmedHistory = {};
    keptKeys.forEach((k) => { trimmedHistory[k] = mergedHistory[k]; });
    const stamped = { ...nextAllData, history: trimmedHistory, lastUpdated: new Date().toISOString() };
    setAllData(stamped);
    if (!DRIVE_CONFIGURED) {
      try { localStorage.setItem(LOCAL_FALLBACK_KEY, JSON.stringify(stamped)); } catch (e) {}
      return;
    }
    setSyncError(false);
    fetch(DRIVE_API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(stamped),
    }).catch(() => setSyncError(true));
  };

  const assetGroups = allData.assetGroups || DEFAULT_ASSET_GROUPS;
  const liabilityGroups = allData.liabilityGroups || DEFAULT_LIABILITY_GROUPS;
  const fixedGroups = allData.fixedGroups || DEFAULT_FIXED_EXPENSE_GROUPS;
  const variableGroups = allData.variableGroups || DEFAULT_VARIABLE_EXPENSE_GROUPS;

  const assetGroupsT = withTotals(assetGroups);
  const liabilityGroupsT = withTotals(liabilityGroups);
  const fixedGroupsT = withTotals(fixedGroups);
  const variableGroupsT = withTotals(variableGroups);

  // Live display groups: reflect the in-progress draft while editing, saved data otherwise.
  const displayAssetGroups = liveGroups(assetGroupsT, editingAssets, assetDraft);
  const displayLiabilityGroups = liveGroups(liabilityGroupsT, editingLiabilities, liabilityDraft);
  const displayFixedGroups = liveGroups(fixedGroupsT, editingFixed, fixedDraft);
  const displayVariableGroups = liveGroups(variableGroupsT, editingVariable, variableDraft);

  const totalAssets = displayAssetGroups.reduce((s, g) => s + g.value, 0);
  const totalLiab = displayLiabilityGroups.reduce((s, g) => s + g.value, 0);
  const netWorth = totalAssets - totalLiab;
  const fixedTotal = displayFixedGroups.reduce((s, g) => s + g.value, 0);
  const variableTotal = displayVariableGroups.reduce((s, g) => s + g.value, 0);
  const totalExpense = fixedTotal + variableTotal;
  const netCashflow = INCOME.total - totalExpense;
  const expenseSplit = [
    { key: "fixed", label: "รายจ่ายคงที่", value: fixedTotal, color: "#8A5A2B" },
    { key: "variable", label: "รายจ่ายผันแปร", value: variableTotal, color: "#D9AF78" },
  ];

  // Checklist always reflects the saved (non-draft) item set.
  const checklistItems = [...fixedGroups.flatMap((g) => g.items), ...variableGroups.flatMap((g) => g.items)];
  const paid = allData[MONTH_KEY] || {};
  const togglePaid = (id) => {
    const month = { ...(allData[MONTH_KEY] || {}) };
    month[id] = !month[id];
    persist({ ...allData, [MONTH_KEY]: month });
  };
  const resetChecklist = () => persist({ ...allData, [MONTH_KEY]: {} });
  const paidCount = checklistItems.filter((it) => paid[it.id]).length;
  const paidSum = checklistItems.filter((it) => paid[it.id]).reduce((s, it) => s + (Number(it.value) || 0), 0);

  // Merge saved history with a live snapshot of the current month (so the
  // trend chart always reflects "right now" even before the first save).
  const historyRecord = { ...(allData.history || {}) };
  historyRecord[MONTH_KEY] = { netWorth, totalAssets, totalLiab, income: INCOME.total, totalExpense, fixedTotal, variableTotal, netCashflow, paidCount, totalItems: checklistItems.length };
  const historyList = Object.keys(historyRecord).sort().slice(-12).map((k) => ({ key: k, ...historyRecord[k] }));

  // Annual bills: kept separate from totalExpense/netCashflow on purpose (a
  // once-a-year bill would badly distort a single month's numbers). Just
  // tracked here for reminders. Reminder window: starts 1 day before the due
  // date and stops as soon as the due date has passed (it isn't tied to any
  // "paid" checkbox — these don't have one).
  const annualBills = allData.annualBills || DEFAULT_ANNUAL_BILLS;
  const annualTotal = annualBills.reduce((s, b) => s + (Number(b.value) || 0), 0);
  const annualUpcoming = annualBills
    .map((b) => ({ ...b, days: daysUntilDate(nextOccurrence(b.dueDate, b.repeatMonths)) }))
    .filter((b) => b.days !== null && b.days >= 0 && b.days <= 1);

  // Monthly fixed/variable items that have a due-day-of-month set — merged
  // with the annual bills above into one combined reminder feed, always
  // sorted soonest-first. Reminder window: starts 1 day before the due day,
  // and — unlike annual bills — keeps reminding (even once overdue) for as
  // long as the item is still unticked this month; it disappears the moment
  // it's ticked off, regardless of date.
  const monthlyUpcoming = checklistItems
    .filter((it) => it.dueDay && !paid[it.id])
    .map((it) => ({ ...it, days: daysUntilDate(nextMonthlyDate(it.dueDay)) }))
    .filter((it) => it.days !== null && it.days <= 1);

  const upcomingBills = [...annualUpcoming, ...monthlyUpcoming].sort((a, b) => a.days - b.days);

  // ---- assets (full CRUD: add / remove / rename / amount / reorder) ----
  const startEditAssets = () => { setAssetDraft(cloneAsDraft(assetGroups)); setEditingAssets(true); };
  const updateAssetName = (gk, id, name) => setAssetDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, name } : it) }));
  const updateAssetValue = (gk, id, value) => setAssetDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, value } : it) }));
  const addAssetItem = (gk) => setAssetDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: [...g.items, { id: makeId(), name: "", value: "0" }] }));
  const removeAssetItem = (gk, id) => setAssetDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.filter((it) => it.id !== id) }));
  const reorderAssetItem = (gk, draggedId, targetId) => setAssetDraft((prev) => reorderItemInGroups(prev, gk, draggedId, targetId));
  const cancelEditAssets = () => { setEditingAssets(false); setAssetDraft(null); };
  const saveEditAssets = () => {
    const finalGroups = assetDraft.map((g) => ({ ...g, items: g.items.map((it) => ({ id: it.id, name: (it.name || "").trim() || "รายการใหม่", value: parseNum(it.value, 0) })) }));
    persist({ ...allData, assetGroups: finalGroups });
    setEditingAssets(false); setAssetDraft(null);
  };

  // ---- liabilities (full CRUD: add / remove / rename / amount / reorder, same as assets) ----
  const startEditLiabilities = () => { setLiabilityDraft(cloneAsDraft(liabilityGroups)); setEditingLiabilities(true); };
  const updateLiabilityName = (gk, id, name) => setLiabilityDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, name } : it) }));
  const updateLiabilityValue = (gk, id, value) => setLiabilityDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, value } : it) }));
  const addLiabilityItem = (gk) => setLiabilityDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: [...g.items, { id: makeId(), name: "", value: "0" }] }));
  const removeLiabilityItem = (gk, id) => setLiabilityDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.filter((it) => it.id !== id) }));
  const reorderLiabilityItem = (gk, draggedId, targetId) => setLiabilityDraft((prev) => reorderItemInGroups(prev, gk, draggedId, targetId));
  const cancelEditLiabilities = () => { setEditingLiabilities(false); setLiabilityDraft(null); };
  const saveEditLiabilities = () => {
    const finalGroups = liabilityDraft.map((g) => ({ ...g, items: g.items.map((it) => ({ id: it.id, name: (it.name || "").trim() || "รายการใหม่", value: parseNum(it.value, 0) })) }));
    persist({ ...allData, liabilityGroups: finalGroups });
    setEditingLiabilities(false); setLiabilityDraft(null);
  };

  // ---- fixed expenses (full CRUD: add / remove / rename items, due-day reminders, plus manage whole categories) ----
  const startEditFixed = () => { setFixedDraft(cloneAsDraft(fixedGroups)); setEditingFixed(true); };
  const updateFixedName = (gk, id, name) => setFixedDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, name } : it) }));
  const updateFixedValue = (gk, id, value) => setFixedDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, value } : it) }));
  const updateFixedDueDay = (gk, id, value) => setFixedDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, dueDay: value } : it) }));
  const addFixedItem = (gk) => setFixedDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: [...g.items, { id: makeId(), name: "", value: "0", dueDay: null }] }));
  const removeFixedItem = (gk, id) => setFixedDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.filter((it) => it.id !== id) }));
  const renameFixedGroup = (gk, label) => setFixedDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, label }));
  const addFixedGroup = () => setFixedDraft((prev) => [...prev, { key: makeGroupId(), label: "", color: NEW_CATEGORY_COLORS[prev.length % NEW_CATEGORY_COLORS.length], items: [] }]);
  const removeFixedGroup = (gk) => setFixedDraft((prev) => prev.filter((g) => g.key !== gk));
  const cancelEditFixed = () => { setEditingFixed(false); setFixedDraft(null); };
  const saveEditFixed = () => {
    const finalGroups = fixedDraft.map((g) => ({ ...g, label: (g.label || "").trim() || "หมวดใหม่", items: g.items.map((it) => ({ id: it.id, name: (it.name || "").trim() || "รายการใหม่", value: parseNum(it.value, 0), dueDay: clampDueDay(it.dueDay) })) }));
    persist({ ...allData, fixedGroups: finalGroups });
    setEditingFixed(false); setFixedDraft(null);
  };

  // ---- variable expenses (full CRUD: add / remove / rename items, due-day reminders, plus manage whole categories) ----
  const startEditVariable = () => { setVariableDraft(cloneAsDraft(variableGroups)); setEditingVariable(true); };
  const updateVariableName = (gk, id, name) => setVariableDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, name } : it) }));
  const updateVariableValue = (gk, id, value) => setVariableDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, value } : it) }));
  const updateVariableDueDay = (gk, id, value) => setVariableDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.map((it) => it.id === id ? { ...it, dueDay: value } : it) }));
  const addVariableItem = (gk) => setVariableDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: [...g.items, { id: makeId(), name: "", value: "0", dueDay: null }] }));
  const removeVariableItem = (gk, id) => setVariableDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, items: g.items.filter((it) => it.id !== id) }));
  const renameVariableGroup = (gk, label) => setVariableDraft((prev) => prev.map((g) => g.key !== gk ? g : { ...g, label }));
  const addVariableGroup = () => setVariableDraft((prev) => [...prev, { key: makeGroupId(), label: "", color: NEW_CATEGORY_COLORS[prev.length % NEW_CATEGORY_COLORS.length], items: [] }]);
  const removeVariableGroup = (gk) => setVariableDraft((prev) => prev.filter((g) => g.key !== gk));
  const cancelEditVariable = () => { setEditingVariable(false); setVariableDraft(null); };
  const saveEditVariable = () => {
    const finalGroups = variableDraft.map((g) => ({ ...g, label: (g.label || "").trim() || "หมวดใหม่", items: g.items.map((it) => ({ id: it.id, name: (it.name || "").trim() || "รายการใหม่", value: parseNum(it.value, 0), dueDay: clampDueDay(it.dueDay) })) }));
    persist({ ...allData, variableGroups: finalGroups });
    setEditingVariable(false); setVariableDraft(null);
  };

  // ---- annual bills (name, amount, due date; add / remove) ----
  const startEditAnnual = () => { setAnnualDraft(annualBills.map((b) => ({ ...b, value: String(b.value) }))); setEditingAnnual(true); };
  const updateAnnualField = (id, field, value) => setAnnualDraft((prev) => prev.map((b) => b.id === id ? { ...b, [field]: value } : b));
  const addAnnualBill = () => {
    const now = new Date();
    const defaultDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-01`;
    setAnnualDraft((prev) => [...prev, { id: makeId(), name: "", value: "0", dueDate: defaultDate, repeatMonths: 12 }]);
  };
  const removeAnnualBill = (id) => setAnnualDraft((prev) => prev.filter((b) => b.id !== id));
  const cancelEditAnnual = () => { setEditingAnnual(false); setAnnualDraft(null); };
  const saveEditAnnual = () => {
    const finalList = annualDraft.map((b) => ({ id: b.id, name: (b.name || "").trim() || "รายการใหม่", value: parseNum(b.value, 0), dueDate: b.dueDate || "", repeatMonths: Number(b.repeatMonths) || 0 }));
    persist({ ...allData, annualBills: finalList });
    setEditingAnnual(false); setAnnualDraft(null);
  };

  const lastUpdatedLabel = allData.lastUpdated ? formatThaiDateTime(new Date(allData.lastUpdated)) : "ยังไม่มีการอัปเดตข้อมูล";
  const liquidGroup = displayAssetGroups.find((g) => g.key === "liquid") || displayAssetGroups[0];

  // Responsive breakpoints: phones stay single-column at their current width;
  // tablets get a wider reading column and a 4-up stat grid; desktops also
  // pair up the asset/liability and fixed/variable-expense sections side by side.
  const viewportWidth = useWindowWidth();
  const isTablet = viewportWidth >= 640;
  const isDesktop = viewportWidth >= 1024;
  const containerMaxWidth = isDesktop ? 1040 : isTablet ? 640 : 480;
  const pairGridStyle = isDesktop ? { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, alignItems: "start" } : {};

  return (
    <div style={{ minHeight: "100vh", background: "#F6F3EC", padding: isDesktop ? "36px 28px 60px" : isTablet ? "32px 20px 60px" : "28px 16px 60px", display: "flex", justifyContent: "center" }}>
      <div style={{ width: "100%", maxWidth: containerMaxWidth }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
          <span style={{ flex: 1, padding: "10px 12px", borderRadius: 12, textAlign: "center", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 600, fontSize: 13, border: "1.5px solid #2F5D46", background: "#2F5D46", color: "#FFFFFF" }}>ภาพรวมการเงิน</span>
          <a href="tax.html" style={{ flex: 1, padding: "10px 12px", borderRadius: 12, textAlign: "center", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 600, fontSize: 13, border: "1px solid #E6E0D2", background: "#FFFFFF", color: "#6B6459", textDecoration: "none" }}>เตรียมภาษี →</a>
        </div>
        <div style={{ marginBottom: 22 }}>
          <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, letterSpacing: "0.1em", color: "#AD8A2E", fontWeight: 600, textTransform: "uppercase" }}>
            HAPPY MONEY · ข้อมูลล่าสุด {lastUpdatedLabel}
          </div>
          <h1 style={{ fontFamily: "'Noto Serif Thai', serif", fontWeight: 700, fontSize: 24, color: "#202B29", margin: "6px 0 0" }}>ภาพรวมการเงิน</h1>
          <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, color: "#6B6459", marginTop: 4 }}>
            Dashboard ประจำเดือน{CURRENT_MONTH_FULL}
          </div>
        </div>

        <UpcomingBillsBanner bills={upcomingBills} />

        <div style={{ background: "#FFFFFF", border: "1px solid #E6E0D2", borderRadius: 18, padding: "20px 20px 22px", marginBottom: 16 }}>
          <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, color: "#6B6459" }}>ความมั่งคั่งสุทธิ (สินทรัพย์ − หนี้สิน)</div>
          <div style={{ fontFamily: "'Noto Serif Thai', serif", fontWeight: 700, fontSize: 34, color: "#202B29", margin: "4px 0 16px" }}>{fmt(netWorth)}</div>
          <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, marginBottom: 5 }}>
            <span style={{ color: "#2F5D46", fontWeight: 600 }}>สินทรัพย์รวม</span>
            <span style={{ color: "#202B29", fontWeight: 700 }}>{fmt(totalAssets)}</span>
          </div>
          <div style={{ width: "100%", height: 10, borderRadius: 999, background: "#EDE8DC", overflow: "hidden" }}>
            <div style={{ width: "100%", height: "100%", background: "#2F5D46" }} />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, margin: "12px 0 5px" }}>
            <span style={{ color: "#7A2E1F", fontWeight: 600 }}>หนี้สินรวม</span>
            <span style={{ color: "#202B29", fontWeight: 700 }}>{fmt(totalLiab)}</span>
          </div>
          <div style={{ width: "100%", height: 10, borderRadius: 999, background: "#EDE8DC", overflow: "hidden" }}>
            <div style={{ width: `${totalAssets ? (totalLiab / totalAssets) * 100 : 0}%`, height: "100%", background: "#7A2E1F" }} />
          </div>
          <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#6B6459", marginTop: 10 }}>
            หนี้สินคิดเป็น {pct(totalLiab, totalAssets)} ของสินทรัพย์รวม
          </div>
        </div>

        <div style={{ marginBottom: 24 }}>
          <SectionTitle title="เปรียบเทียบข้อมูลรายเดือน" captionBelow="ย้อนหลังสูงสุด 12 เดือน" />
          <div style={{ background: "#FFFFFF", border: "1px solid #E6E0D2", borderRadius: 14, padding: 16 }}>
            <MonthlyTrendChart history={historyList} currentKey={MONTH_KEY} />
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: isTablet ? "repeat(4, 1fr)" : "1fr 1fr", gap: 10, marginBottom: 24 }}>
          <StatCard label={`รายรับ ${CURRENT_MONTH_ABBR}`} value={fmt(INCOME.total)} color="#1F6E6B" />
          <StatCard label={`รายจ่าย ${CURRENT_MONTH_ABBR}`} value={fmt(totalExpense)} sub={`คงที่ ${fmt(fixedTotal)} + ผันแปร ${fmt(variableTotal)}`} color="#8A5A2B" />
          <StatCard label="คงเหลือสุทธิเดือนนี้" value={fmt(netCashflow)} sub={netCashflow >= 0 ? `อัตราการออม ${pct(netCashflow, INCOME.total)}` : "รายจ่ายสูงกว่ารายรับเดือนนี้"} color={netCashflow >= 0 ? "#202B29" : "#7A2E1F"} />
          <StatCard label="สินทรัพย์สภาพคล่อง" value={fmt(liquidGroup ? liquidGroup.value : 0)} sub="เงินสด/บัญชีออมทรัพย์" color="#202B29" />
        </div>

        <div style={pairGridStyle}>
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 10 }}>
              <SectionTitle eyebrow="สินทรัพย์" title={`รวม ${fmt(totalAssets)}`} />
              <EditToggle editing={editingAssets} onStart={startEditAssets} onSave={saveEditAssets} onCancel={cancelEditAssets} startLabel="แก้ไขรายการ" />
            </div>
            <CompositionBar groups={displayAssetGroups} total={totalAssets} />
            {editingAssets ? (
              <GroupEditor groups={assetDraft} onChangeValue={updateAssetValue} onChangeName={updateAssetName} onAddItem={addAssetItem} onRemoveItem={removeAssetItem}
                allowReorder onReorderItem={reorderAssetItem} />
            ) : (
              <GroupList groups={displayAssetGroups} total={totalAssets} />
            )}
            {editingAssets && <div style={hintStyle}>เพิ่ม/ลบรายการ แก้ชื่อและยอดเงินได้ แล้วกด "บันทึก" เพื่อจำการเปลี่ยนแปลงไว้ใช้ครั้งถัดไป</div>}
          </div>

          <div style={{ marginBottom: 24 }}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 10 }}>
              <SectionTitle eyebrow="หนี้สิน" title={`รวม ${fmt(totalLiab)}`} />
              <EditToggle editing={editingLiabilities} onStart={startEditLiabilities} onSave={saveEditLiabilities} onCancel={cancelEditLiabilities} startLabel="แก้ไขรายการ" />
            </div>
            <CompositionBar groups={displayLiabilityGroups} total={totalLiab} />
            {editingLiabilities ? (
              <GroupEditor groups={liabilityDraft} onChangeValue={updateLiabilityValue} onChangeName={updateLiabilityName} onAddItem={addLiabilityItem} onRemoveItem={removeLiabilityItem}
                allowReorder onReorderItem={reorderLiabilityItem} />
            ) : (
              <GroupList groups={displayLiabilityGroups} total={totalLiab} />
            )}
            {editingLiabilities && <div style={hintStyle}>เพิ่ม/ลบรายการ แก้ชื่อและยอดเงินได้ แล้วกด "บันทึก" เพื่อจำการเปลี่ยนแปลงไว้ใช้ครั้งถัดไป</div>}
          </div>
        </div>

        <div style={{ marginBottom: 24 }}>
          <SectionTitle eyebrow={`กระแสเงินสด · ${CURRENT_MONTH_FULL}`} title="รายรับ vs รายจ่าย" />
          <div style={{ background: "#FFFFFF", border: "1px solid #E6E0D2", borderRadius: 14, padding: 16 }}>
            <div style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, marginBottom: 5 }}>
                <span style={{ color: "#1F6E6B", fontWeight: 600 }}>รายรับ</span>
                <span style={{ fontWeight: 700, color: "#202B29" }}>{fmt(INCOME.total)}</span>
              </div>
              <div style={{ width: "100%", height: 12, borderRadius: 999, background: "#EDE8DC" }}>
                <div style={{ width: "100%", height: "100%", borderRadius: 999, background: "#1F6E6B" }} />
              </div>
            </div>
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 13, marginBottom: 5 }}>
                <span style={{ color: "#8A5A2B", fontWeight: 600 }}>รายจ่าย</span>
                <span style={{ fontWeight: 700, color: "#202B29" }}>{fmt(totalExpense)}</span>
              </div>
              <div style={{ width: "100%", height: 12, borderRadius: 999, background: "#EDE8DC" }}>
                <div style={{ width: `${Math.min((totalExpense / INCOME.total) * 100, 100)}%`, height: "100%", borderRadius: 999, background: "#8A5A2B" }} />
              </div>
            </div>
            <div style={{ marginTop: 14, paddingTop: 12, borderTop: "1px dashed #E6E0D2", display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, color: "#6B6459" }}>คงเหลือสุทธิ</span>
              <span style={{ fontFamily: "'Noto Serif Thai', serif", fontWeight: 700, fontSize: 20, color: netCashflow >= 0 ? "#202B29" : "#7A2E1F" }}>{fmt(netCashflow)}</span>
            </div>
            {netCashflow < 0 && (
              <div style={{ marginTop: 6, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#7A2E1F" }}>
                รายจ่ายรวมสูงกว่ารายรับ {fmt(Math.abs(netCashflow))} บาทในเดือนนี้
              </div>
            )}
          </div>
        </div>

        <div style={{ marginBottom: 8 }}>
          <SectionTitle eyebrow="รายจ่ายแยกตามหมวด" title={`รวม ${fmt(totalExpense)}`} />
          <CompositionBar groups={expenseSplit} total={totalExpense} />
          <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#6B6459", margin: "6px 0 18px" }}>
            <span>คงที่ {fmt(fixedTotal)} ({pct(fixedTotal, totalExpense)})</span>
            <span>ผันแปร {fmt(variableTotal)} ({pct(variableTotal, totalExpense)})</span>
          </div>

          <div style={{ background: "#FFFFFF", border: "1px solid #E6E0D2", borderRadius: 14, padding: 16, marginBottom: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
              <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 600, color: "#202B29" }}>เช็คลิสต์การจ่ายเดือนนี้</span>
              <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12, color: "#6B6459" }}>{paidCount}/{checklistItems.length} รายการ</span>
            </div>
            <div style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11, marginBottom: 8, color: syncError ? "#7A2E1F" : DRIVE_CONFIGURED ? "#2F5D46" : "#AD8A2E" }}>
              {!loaded
                ? "กำลังโหลด..."
                : syncError
                ? "⚠️ ซิงก์ Google Drive ไม่สำเร็จ (เช็คอินเทอร์เน็ต/URL) — ใช้ข้อมูลล่าสุดที่มีอยู่ไปก่อน"
                : DRIVE_CONFIGURED
                ? "☁️ ซิงก์กับ Google Drive แล้ว — เปิดจากเครื่องไหนก็เห็นเหมือนกัน"
                : "ยังไม่ได้ตั้งค่า Google Drive — ข้อมูลเก็บไว้ในเบราว์เซอร์นี้ก่อน"}
            </div>
            <div style={{ width: "100%", height: 8, borderRadius: 999, background: "#EDE8DC", overflow: "hidden" }}>
              <div style={{ width: `${checklistItems.length ? (paidCount / checklistItems.length) * 100 : 0}%`, height: "100%", background: "#2F5D46", transition: "width .25s" }} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, color: "#6B6459" }}>
              <span>จ่ายแล้ว {fmt(paidSum)} จาก {fmt(totalExpense)}</span>
              <button onClick={resetChecklist} style={{ background: "none", border: "none", color: "#AD8A2E", fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11.5, cursor: "pointer", padding: 0 }}>ล้างเช็คลิสต์</button>
            </div>
          </div>

          <div style={pairGridStyle}>
            <div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 2 }}>
                <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 600, color: "#8A5A2B" }}>รายจ่ายคงที่</span>
                <EditToggle editing={editingFixed} onStart={startEditFixed} onSave={saveEditFixed} onCancel={cancelEditFixed} startLabel="แก้ไขรายการ" />
              </div>
              {editingFixed ? (
                <GroupEditor groups={fixedDraft} onChangeValue={updateFixedValue} onChangeName={updateFixedName} onAddItem={addFixedItem} onRemoveItem={removeFixedItem}
                  allowCategoryManagement onRenameGroup={renameFixedGroup} onAddGroup={addFixedGroup} onRemoveGroup={removeFixedGroup}
                  allowDueDay onChangeDueDay={updateFixedDueDay} />
              ) : (
                <GroupList groups={displayFixedGroups} total={fixedTotal} checkable paid={paid} onToggle={togglePaid} showDueInfo />
              )}
              {editingFixed && <div style={hintStyle}>เพิ่ม/ลบรายการหรือทั้งหมวดหมู่ แก้ชื่อและยอดเงินได้ ใส่วันที่ครบกำหนดของทุกเดือนได้ (ไม่บังคับ) แล้วกด "บันทึก" เพื่อจำการเปลี่ยนแปลงไว้ใช้ครั้งถัดไป</div>}
            </div>

            <div style={{ marginTop: isDesktop ? 0 : 20 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 2 }}>
                <span style={{ fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 12.5, fontWeight: 600, color: "#8A5A2B" }}>รายจ่ายผันแปร</span>
                <EditToggle editing={editingVariable} onStart={startEditVariable} onSave={saveEditVariable} onCancel={cancelEditVariable} startLabel="แก้ไขรายการ" />
              </div>
              {editingVariable ? (
                <GroupEditor groups={variableDraft} onChangeValue={updateVariableValue} onChangeName={updateVariableName} onAddItem={addVariableItem} onRemoveItem={removeVariableItem}
                  allowCategoryManagement onRenameGroup={renameVariableGroup} onAddGroup={addVariableGroup} onRemoveGroup={removeVariableGroup}
                  allowDueDay onChangeDueDay={updateVariableDueDay} />
              ) : (
                <GroupList groups={displayVariableGroups} total={variableTotal} checkable paid={paid} onToggle={togglePaid} showDueInfo />
              )}
              {editingVariable && <div style={hintStyle}>เพิ่ม/ลบรายการหรือทั้งหมวดหมู่ แก้ชื่อและยอดเงินได้ ใส่วันที่ครบกำหนดของทุกเดือนได้ (ไม่บังคับ) แล้วกด "บันทึก" เพื่อจำการเปลี่ยนแปลงไว้ใช้ครั้งถัดไป</div>}
            </div>
          </div>
        </div>

        <div style={{ marginTop: 32, marginBottom: 24, paddingTop: 24, borderTop: "1px solid #E6E0D2" }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 10 }}>
            <SectionTitle eyebrow="รายจ่ายประจำปี / ตามรอบ" title={`รวม ${fmt(annualTotal)}`} />
            <EditToggle editing={editingAnnual} onStart={startEditAnnual} onSave={saveEditAnnual} onCancel={cancelEditAnnual} startLabel="แก้ไขรายการ" />
          </div>
          {editingAnnual ? (
            <AnnualBillsEditor bills={annualDraft} onChangeField={updateAnnualField} onAdd={addAnnualBill} onRemove={removeAnnualBill} />
          ) : (
            <AnnualBillsList bills={annualBills} />
          )}
          {editingAnnual && <div style={hintStyle}>แก้ไขชื่อ ยอดเงิน วันครบกำหนด และรอบการจ่ายซ้ำได้ แล้วกด "บันทึก" — ระบบจะแจ้งเตือนอัตโนมัติล่วงหน้า 1 วันก่อนถึงกำหนด และจะหยุดแจ้งเมื่อเลยวันครบกำหนดไปแล้ว (ไม่รวมในยอดรายจ่ายรายเดือนด้านบน เพื่อไม่ให้ตัวเลขเดือนใดเดือนหนึ่งเพี้ยน)</div>}
        </div>

        <div style={{ marginTop: 18, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontSize: 11, color: "#8C8577", lineHeight: 1.6 }}>
          หมายเหตุ: กด "แก้ไขรายการ" ในหมวดสินทรัพย์ หนี้สิน รายจ่าย หรือรายจ่ายประจำปี เพื่อเพิ่ม/ลบ/เปลี่ยนชื่อและยอดของแต่ละรายการ ในหมวดสินทรัพย์และหนี้สิน มีไอคอน ⠿ ให้ลาก (drag) จัดเรียงลำดับรายการเองได้ด้วย ในหมวดรายจ่ายคงที่/ผันแปร ใส่วันที่ครบกำหนดของทุกเดือน (1-31) ได้ต่อรายการ รายการที่มีวันที่จะเรียงขึ้นก่อนตามความใกล้ถึงกำหนด แตะรายการในเช็คลิสต์เพื่อติ๊กว่าจ่ายแล้ว เช็คลิสต์จะรีเซ็ตเองอัตโนมัติทุกวันที่ 1 ของเดือนใหม่ "ข้อมูลล่าสุด" ด้านบนจะอัปเดตทุกครั้งที่มีการแก้ไขยอดเงินหรือติ๊ก/ยกเลิกติ๊ก ทุกครั้งที่มีการบันทึกข้อมูล ระบบจะเก็บภาพรวมของเดือนนั้นไว้ในกราฟ "เปรียบเทียบข้อมูลรายเดือน" โดยอัตโนมัติ (เก็บย้อนหลังสูงสุด 12 เดือน แตะแท็บด้านบนกราฟเพื่อสลับดูความมั่งคั่งสุทธิ สินทรัพย์รวม หนี้สินรวม รายรับ รายจ่าย หรือคงเหลือสุทธิต่อเดือน แล้วแตะแท่งกราฟเพื่อดูรายละเอียดของเดือนนั้น) แบนเนอร์แจ้งเตือนด้านบนสุดของหน้าจะขึ้นล่วงหน้า 1 วันก่อนถึงกำหนดเสมอ — รายจ่ายรายเดือนที่ยังไม่ติ๊กจะแจ้งต่อเนื่องจนกว่าจะติ๊กว่าจ่ายแล้ว (ติ๊กแล้วหายทันที) ส่วนรายจ่ายประจำปี/ตามรอบจะแจ้งจนกว่าจะเลยวันครบกำหนดแล้วหยุดเอง (ไม่ถูกรวมเข้าไปในยอดรายจ่ายรายเดือน) สถานะทั้งหมดจะซิงก์ขึ้น Google Drive ของคุณ (ผ่าน Google Apps Script) เปิดเว็บนี้จากอุปกรณ์ไหนก็เห็นข้อมูลเดียวกัน
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
